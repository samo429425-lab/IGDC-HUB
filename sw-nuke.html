<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Cache & Service Worker Nuke</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f6f7fb;
      color: #222;
      font-family: sans-serif;
    }
    button {
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #0077ff;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #005acc;
    }
    #msg {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h2>Service Worker & Cache Cleaner</h2>
  <button id="nuke">🧹 Clear Cache Now</button>
  <p id="msg"></p>

  <script>
    async function nukeEverything() {
      const msg = document.getElementById("msg");
      msg.innerText = "Clearing cache...";
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) await reg.unregister();

        const cacheNames = await caches.keys();
        for (const name of cacheNames) await caches.delete(name);

        localStorage.clear();
        sessionStorage.clear();

        if (window.indexedDB && indexedDB.databases) {
          const dbs = await indexedDB.databases();
          for (const db of dbs) indexedDB.deleteDatabase(db.name);
        }

        msg.innerText = "✅ Cache cleared. Reloading...";
        setTimeout(() => {
          const ts = Date.now();
          window.location.replace(`/?reset=${ts}`);
        }, 800);
      } catch (err) {
        msg.innerText = `❌ Error: ${err}`;
      }
    }

    document.getElementById("nuke").addEventListener("click", nukeEverything);
  </script>
</body>
</html>
