name: AI Thumbnails Refresh

on:
  workflow_dispatch:              # 수동 실행
  schedule:
    - cron: '0 */6 * * *'         # 6시간마다 (UTC)

permissions:
  contents: write                 # push 권한

concurrency:
  group: ai-refresh               # 중복 실행 방지
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      BRANCH: main                # 기본 브랜치명 다르면 변경
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ env.BRANCH }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies & prepare dir
        run: |
          set -e
          mkdir -p data
          if [ -f package.json ]; then
            npm ci || npm install
          else
            npm init -y
            # 필요한 외부 모듈만 설치 (fs는 내장 모듈이므로 설치 불필요)
            npm install axios
          fi

      - name: Run AI refresh script
        run: |
          set -e
          if [ -f ai_refresh.js ]; then
            node ai_refresh.js
          elif [ -f scripts/ai_refresh.js ]; then
            node scripts/ai_refresh.js
          else
            echo "✖ ai_refresh.js not found in repo root or scripts/"; exit 1
          fi

      - name: Commit & Push updated files (if any)
        run: |
          set -e
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "AI refresh [skip ci]"
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
          else
            echo "No changes"
          fi

      - name: Trigger Netlify build hook (if set)
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        if: ${{ env.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -s -X POST -d '{}' "$NETLIFY_BUILD_HOOK"
