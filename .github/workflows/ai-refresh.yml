name: AI Thumbnails Refresh

on:
workflow_dispatch: # 수동 실행 버튼
schedule:
- cron: "0 */6 * * *" # 6시간마다 자동 실행 (UTC)

jobs:
refresh:
runs-on: ubuntu-latest

steps:
- name: Checkout repository
uses: actions/checkout@v4

- name: Set up Node.js
uses: actions/setup-node@v3
with:
node-version: '18'

- name: Install dependencies
run: npm install axios fs

- name: Ensure data dir
run: mkdir -p data

- name: Run AI refresh script
run: node ai_refresh.js

- name: Commit & Push updated thumbnails
run: |
git config user.name "github-actions"
git config user.email "github-actions@github.com"
git add data/thumbnails.json || echo "no thumbnails.json"
git commit -m "AI refresh thumbnails [skip ci]" || echo "No changes"
git push

