name: AI Thumbnails Refresh

on:
  workflow_dispatch:              # 수동 실행
  schedule:
    - cron: '0 */6 * * *'         # 6시간마다 (UTC)

permissions:
  contents: write                 # push 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: main               # 기본 브랜치 명이 다르면 수정

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies & prepare dir
        shell: bash
        run: |
          set -e
          mkdir -p data
          if [ -f package.json ]; then
            npm ci || npm install
          else
            npm init -y
            npm install axios fs
          fi

      - name: Run AI refresh script
        run: node ai_refresh.js    # scripts/ 경로면 수정: node scripts/ai_refresh.js

      - name: Commit & Push updated files (if any)
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "AI refresh [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes"
          fi

      - name: Trigger Netlify build hook (if set)
        if: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
