name: AI Thumbnails Refresh

on:
  workflow_dispatch:   # 수동 실행 버튼
  schedule:            # 6시간마다 실행 (UTC)
    - cron: "0 */6 * * *"

permissions:
  contents: write      # git push 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies & prepare dir
        run: |
          npm ci || npm install
          mkdir -p data

      - name: Run AI refresh script
        run: node ai_refresh.js

      - name: Commit & Push updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "AI refresh thumbnails [skip ci]" || echo "No changes"
          git push

      - name: Trigger Netlify build hook (if set)
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -X POST -d '{}' ${{ secrets.NETLIFY_BUILD_HOOK }}