name: AI Thumbnails Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios fs

      # ✅ 레포 루트에 있는 파일로 경로 수정
      - name: Run AI refresh script
        run: node ai_refresh.js

      # ✅ 바뀐 모든 파일을 안전하게 추가
      - name: Commit & Push updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "AI refresh [skip ci]" || echo "No changes"
          git push

      # ✅ Netlify 훅이 있으면만 실행(없으면 건너뜀)
      - name: Trigger Netlify build hook (if set)
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -X POST -d {} "${{ secrets.NETLIFY_BUILD_HOOK }}"