<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results | Maru Platform</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .search-meta { color:#666; margin-bottom:16px; }
    .result-item { border-bottom:1px solid #e5e7eb; padding:12px 0; }
    .result-item a { font-size:1.05rem; color:#0b5ed7; text-decoration:none; }
    .result-item a:hover { text-decoration:underline; }
    .desc { color:#444; margin-top:4px; }
    .external-links { margin-top:24px; padding-top:16px; border-top:2px solid #f1f3f5; }
    .external-links a { margin-right:12px; }
    .translate { margin-top:16px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Search Results</h1>
    <div class="search-meta" id="searchMeta"></div>

    <div id="results"></div>

    <div class="external-links" id="externalLinks"></div>

    <div class="translate">
      <a id="googleTranslateLink" target="_blank" rel="noopener noreferrer">🔤 View with Google Translate</a>
    </div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');

  if (!q) {
    document.getElementById('searchMeta').textContent = 'No search keyword provided.';
    return;
  }

  document.getElementById('searchMeta').textContent = `Results for: "${q}"`;

  const currentUrl = window.location.href;
  document.getElementById('googleTranslateLink').href =
    'https://translate.google.com/translate?u=' + encodeURIComponent(currentUrl);

  fetch(`/.netlify/functions/feed?q=${encodeURIComponent(q)}`)
    .then(res => res.json())
    .then(data => {
      const resultsEl = document.getElementById('results');
      if (!data || !data.results || data.results.length === 0) {
        resultsEl.innerHTML = '<p>No internal results found.</p>';
      } else {
        data.results.forEach(item => {
          const div = document.createElement('div');
          div.className = 'result-item';
          div.innerHTML = `
            <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
            <div class="desc">${item.category || ''}</div>
          `;
          resultsEl.appendChild(div);
        });
      }

      if (data.providers) {
        const ext = document.getElementById('externalLinks');
        ext.innerHTML = `
          <strong>External search:</strong><br/>
          <a href="${data.providers.google}" target="_blank">Google</a>
          <a href="${data.providers.bing}" target="_blank">Bing</a>
          <a href="${data.providers.naver}" target="_blank">Naver</a>
        `;
      }
    })
    .catch(() => {
      document.getElementById('results').innerHTML = '<p>Error loading search results.</p>';
    });
})();
</script>

</body>
</html>
