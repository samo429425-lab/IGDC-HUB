<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Results | IGDC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background:#f7f7f7; color:#111; }
    header { position: sticky; top:0; background:#fff; border-bottom:1px solid #ddd; padding:12px; z-index:10; }
    .search-box { display:flex; gap:8px; }
    .search-box input { flex:1; padding:10px; font-size:16px; }
    .search-box button { padding:10px 16px; font-size:16px; cursor:pointer; }
    .container { max-width:1100px; margin:0 auto; padding:12px; }
    .search-meta { color:#666; margin:12px 0; }
    .result-item { background:#fff; border-radius:6px; padding:12px; margin-bottom:10px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
    .result-title { font-weight:600; margin-bottom:6px; }
    .result-link { display:block; font-weight:600; margin-bottom:6px; color:#0b5ed7; text-decoration:none; }
    .result-link:hover { text-decoration:underline; }
    .result-summary { font-size:14px; color:#444; }
    .status { padding:20px; text-align:center; color:#666; }
    .external-links { margin-top:24px; padding-top:16px; border-top:2px solid #f1f3f5; }
    .external-links a { margin-right:12px; }
    .translate { margin-top:16px; }
  </style>
</head>
<body>

<header>
  <div class="search-box">
    <input id="searchInput" type="search" placeholder="Search IGDC..." />
    <button id="searchBtn">Search</button>
  </div>
</header>

<div class="container">
  <div class="search-meta" id="searchMeta"></div>
  <div id="results"><div class="status">Enter a search term.</div></div>
  <div class="external-links" id="externalLinks" style="display:none;"></div>
  <div class="translate">
    <a id="googleTranslateLink" target="_blank" rel="noopener noreferrer">🔤 View with Google Translate</a>
  </div>
</div>

<script src="/search.js"></script>
</body>
</html>
