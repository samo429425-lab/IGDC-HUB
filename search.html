<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>IGDC Global Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f6fa}
    .wrap{max-width:980px;margin:40px auto;padding:0 20px}
    .bar{display:flex;gap:8px}
    #searchInput{flex:1;padding:14px 16px;font-size:16px;border-radius:10px;border:1px solid #ccc}
    #searchBtn{padding:14px 22px;font-size:15px;border-radius:10px;border:none;background:#2563eb;color:#fff;cursor:pointer}
    #searchStatus{margin:14px 0;font-size:14px;color:#555}
    #searchResults{margin-top:10px}
    .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;
          box-shadow:0 4px 10px rgba(0,0,0,.06);display:flex;gap:14px;cursor:pointer}
    .thumb{width:120px;height:90px;border-radius:10px;object-fit:cover;flex-shrink:0}
    .title{font-size:17px;font-weight:700;color:#111827}
    .desc{margin-top:6px;font-size:14px;color:#4b5563;line-height:1.45}
    .meta{margin-top:8px;font-size:12px;color:#6b7280;display:flex;gap:8px;align-items:center}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;background:#eef2ff}
    a{text-decoration:none;color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <input id="searchInput" placeholder="Search the world with IGDC" />
      <button id="searchBtn">Search</button>
    </div>
    <div id="searchStatus"></div>
    <div id="searchResults"></div>
  </div>

  <script src="/assets/js/search.js"></script>
</body>
</html>
