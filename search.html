<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>IGDC 통합 검색</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  margin: 0;
  padding: 0;
  background: #f7f7f9;
}
.header {
  padding: 16px 20px;
  background: #ffffff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  position: sticky;
  top: 0;
  z-index: 10;
}
.search-bar {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
}
.search-bar input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 15px;
}
.search-bar button {
  border: none;
  background: #2563eb;
  color: #fff;
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
}
.search-bar button:hover {
  background: #1d4ed8;
}

#searchStatus {
  max-width: 900px;
  margin: 12px auto;
  font-size: 14px;
  color: #555;
}

#searchResults {
  max-width: 900px;
  margin: 0 auto 24px auto;
}

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: #ffffff;
  z-index: 20;
}
#viewerHeader {
  height: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 12px;
  border-bottom: 1px solid #eee;
  background: #fafafa;
}
#viewerHeader button {
  border: none;
  background: #2563eb;
  color: #fff;
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
}
#viewerHeader span {
  font-size: 13px;
  color: #444;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#viewerFrame {
  width: 100%;
  height: calc(100vh - 48px);
  border: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="검색어를 입력하세요" />
    <button id="searchBtn">검색</button>
  </div>
</div>

<div id="searchStatus"></div>
<div id="searchResults"></div>

<!-- Viewer (Secret / Embedded Page) -->
<div id="viewer">
  <div id="viewerHeader">
    <button id="backBtn">← 검색으로</button>
    <span id="viewerUrl"></span>
  </div>
  <iframe id="viewerFrame"></iframe>
</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const q = params.get('q') || '';
  const open = params.get('open');

  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');
  const viewer = document.getElementById('viewer');
  const viewerFrame = document.getElementById('viewerFrame');
  const viewerUrl = document.getElementById('viewerUrl');
  const backBtn = document.getElementById('backBtn');

  if (input) input.value = q;

  btn.addEventListener('click', () => {
    const v = input.value.trim();
    if (!v) return;
    const u = new URL(location.href);
    u.searchParams.set('q', v);
    u.searchParams.delete('open');
    location.href = u.toString();
  });

  backBtn.addEventListener('click', () => {
    history.back();
  });

  if (open) {
    viewer.style.display = 'block';
    viewerFrame.src = decodeURIComponent(open);
    viewerUrl.textContent = decodeURIComponent(open);
  }

  window.addEventListener('popstate', () => {
    const p = new URLSearchParams(location.search);
    if (!p.get('open')) {
      viewer.style.display = 'none';
      viewerFrame.src = '';
    }
  });
})();
</script>

<script src="/assets/js/search.js"></script>
</body>
</html>
