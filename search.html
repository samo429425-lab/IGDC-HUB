<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>IGDC 통합 검색</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f6f7f9;
      color: #222;
    }
    header {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 14px 20px;
      z-index: 10;
    }
    .search-bar {
      display: flex;
      gap: 8px;
      max-width: 960px;
      margin: 0 auto;
    }
    .search-bar input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }
    .search-bar button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    main {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 20px;
    }
    #searchStatus {
      margin-bottom: 16px;
      color: #555;
    }
    .search-result-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      padding: 16px;
      margin-bottom: 12px;
    }
    .search-result-item a {
      font-size: 18px;
      font-weight: 600;
      color: #0066cc;
      text-decoration: none;
    }
    .search-result-item a:hover {
      text-decoration: underline;
    }
    .search-result-desc {
      margin-top: 6px;
      font-size: 14px;
      color: #444;
    }
  </style>
</head>
<body>

<header>
  <div class="search-bar">
    <input id="searchInput" type="search" placeholder="검색어를 입력하세요" />
    <button id="searchBtn">검색</button>
  </div>
</header>

<main>
  <div id="searchStatus"></div>
  <div id="searchResults"></div>
</main>

<script src="/assets/js/search.js"></script>
</body>
</html>
