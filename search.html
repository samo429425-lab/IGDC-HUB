<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>IGDC Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background:#f6f7fb; }
    .search-wrap { max-width:960px; margin:40px auto; padding:0 20px; }
    .search-bar { display:flex; gap:8px; }
    #searchInput {
      flex:1; padding:14px 16px; font-size:16px;
      border-radius:10px; border:1px solid #ccc;
    }
    #searchBtn {
      padding:14px 20px; font-size:15px;
      border-radius:10px; border:none;
      background:#4f46e5; color:#fff; cursor:pointer;
    }
    #searchStatus { margin:16px 0; color:#555; font-size:14px; }
    #searchResults { margin-top:20px; }
    .result-card {
      background:#fff; border-radius:14px;
      padding:16px; margin-bottom:14px;
      box-shadow:0 4px 10px rgba(0,0,0,0.06);
      cursor:pointer;
      display:flex; gap:14px;
    }
    .result-thumb {
      width:120px; height:90px;
      border-radius:10px; object-fit:cover;
      flex-shrink:0;
    }
    .result-body { flex:1; }
    .result-title {
      font-size:17px; font-weight:700;
      color:#1f2937; margin-bottom:6px;
    }
    .result-desc {
      font-size:14px; color:#4b5563;
      line-height:1.4;
    }
    .result-meta {
      margin-top:6px; font-size:12px; color:#6b7280;
    }
    a { text-decoration:none; color:inherit; }
  </style>
</head>
<body>
  <div class="search-wrap">
    <div class="search-bar">
      <input id="searchInput" placeholder="검색어를 입력하세요" />
      <button id="searchBtn">검색</button>
    </div>
    <div id="searchStatus"></div>
    <div id="searchResults"></div>
  </div>

  <script src="/assets/js/search.js"></script>
</body>
</html>
