<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard (Wallet + Donation + SelfCheck)</title>
  <!-- 필요한 최소 라이브러리만 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --card-bg:#ffffff; --card-br:12px; --shadow:0 8px 24px rgba(0,0,0,.08); }
    body { font-family: system-ui,Segoe UI,Apple SD Gothic Neo,Apple Color Emoji,Roboto,Helvetica,Arial,sans-serif; margin:0; background:#f7f7fb; color:#111; }
    .admin-container { display:flex; min-height:100vh; }
    .admin-sidebar { width:260px; background:#111827; color:#fff; padding:20px; }
    .admin-sidebar h2 { margin:0 0 12px; font-size:18px; }
    .admin-sidebar ul { list-style:none; padding:0; margin:0; }
    .admin-sidebar li { margin:8px 0; }
    .admin-sidebar a { color:#d1d5db; text-decoration:none; }
    .admin-main { flex:1; padding:24px; display:grid; gap:16px; grid-template-columns: 1fr; }
    .card { background:var(--card-bg); border-radius:var(--card-br); box-shadow:var(--shadow); padding:16px; }
    .card h3 { margin:0 0 8px; font-size:18px; }
    .kpi { font-size:28px; font-weight:700; }
    .muted { color:#6b7280; font-size:12px; }
    .row { display:grid; gap:16px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; border:1px solid #e5e7eb; background:#fff; cursor:pointer; }
    .btn:active { transform: translateY(1px); }
    /* 팝업(모달) */
    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.55); z-index:9999; }
    .modal.open { display:flex; }
    .modal-card { width:min(1080px, 92vw); background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:20px; position:relative; }
    .modal-close { position:absolute; right:14px; top:10px; border:none; background:transparent; font-size:22px; cursor:pointer; }
    .grid-2 { display:grid; gap:16px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 900px){ .row, .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
      <h2>서버 플랫폼 관리</h2>
      <ul>
        <li><a>백엔드 유입 상황</a></li>
        <li><a>도네이션 통계</a></li>
        <li><a>AI 점검</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <!-- 1) 지갑 잔액 -->
      <section class="card" id="wallet-card">
        <h3>지갑 정보 (LBank)</h3>
        <div class="kpi" id="wallet-balance">0 USDT</div>
        <div class="muted" id="wallet-updated">-</div>
        <div style="margin-top:10px;">
          <button class="btn" id="refreshWallet">즉시 새로고침</button>
        </div>
      </section>

      <!-- 2) 도네이션 수치 -->
      <section class="card" id="donation-card">
        <h3>도네이션 현황</h3>
        <div class="row">
          <div>
            <div class="kpi" id="donation-amount">0</div>
            <div class="muted">총 후원금액 (USD 환산)</div>
          </div>
          <div>
            <div class="kpi" id="donation-supporters">0</div>
            <div class="muted">누적 후원자 수</div>
          </div>
        </div>
      </section>

      <!-- 3) AI 점검창 하단 공란 → 셀프체크 요약 그래프 + 팝업 -->
      <section class="card" id="selfcheck-card">
        <div class="row">
          <div>
            <h3>실시간 유입 Self-Check</h3>
            <canvas id="selfcheck-mini" height="120"></canvas>
            <div class="muted" id="selfcheck-updated">-</div>
          </div>
          <div>
            <h3>지역별 접속 (요약)</h3>
            <canvas id="geo-mini" height="120"></canvas>
          </div>
        </div>
        <div style="margin-top:10px;">
          <button class="btn" id="openSelfcheck">상세 보기 (팝업)</button>
        </div>
      </section>
    </main>
  </div>

  <!-- 팝업: SelfCheck 상세 -->
  <div class="modal" id="selfcheck-modal">
    <div class="modal-card">
      <button class="modal-close" id="closeModal" aria-label="close">×</button>
      <h3 style="margin:0 0 12px;">실시간 유입 상세 현황</h3>
      <div class="grid-2">
        <div class="card">
          <h3>시간대별 접속</h3>
          <canvas id="selfcheck-timeline" height="240"></canvas>
        </div>
        <div class="card">
          <h3>지역별 접속</h3>
          <canvas id="geo-large" height="240"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WALLETS_ENDPOINT = '/.netlify/functions/wallets';
    const BACKEND_REPORT = '/.netlify/functions/backend-report';

    // 1) Wallet + Donation 동기화
    async function syncWalletDonation() {
      try {
        const res = await fetch(WALLETS_ENDPOINT, { cache: 'no-store' });
        const data = await res.json();

        if (data?.wallet) {
          const bal = Number(data.wallet.balance || 0);
          document.getElementById('wallet-balance').textContent = bal.toLocaleString() + ' USDT';
        }
        if (data?.donation) {
          const total = Number(data.donation.total || 0);
          const supporters = Number(data.donation.supporters || 0);
          document.getElementById('donation-amount').textContent = total.toLocaleString();
          document.getElementById('donation-supporters').textContent = supporters.toLocaleString();
        }
        const updated = data?.updated ? new Date(data.updated) : new Date();
        document.getElementById('wallet-updated').textContent = '업데이트: ' + updated.toLocaleString();
      } catch (e) {
        console.error('Wallet/Donation sync error:', e);
      }
    }
    document.getElementById('refreshWallet').addEventListener('click', syncWalletDonation);

    // 2) SelfCheck(실시간 유입)
    async function fetchSelfcheck() {
      try {
        const r = await fetch(BACKEND_REPORT, { cache: 'no-store' });
        if (!r.ok) throw new Error('backend-report not ready');
        return await r.json();
      } catch (e) {
        const now = new Date();
        const hours = [...Array(12)].map((_, i) => (now.getHours() - (11 - i) + 24) % 24);
        return {
          ok: false,
          note: 'fallback (backend-report missing)',
          timeline: hours.map(h => ({ hour: h, users: Math.floor(10 + Math.random()*30) })),
          regions: [
            { name: 'Korea', users: Math.floor(40 + Math.random()*30) },
            { name: 'USA', users: Math.floor(20 + Math.random()*20) },
            { name: 'Japan', users: Math.floor(10 + Math.random()*15) },
            { name: 'Europe', users: Math.floor(10 + Math.random()*15) },
            { name: 'Other', users: Math.floor(5 + Math.random()*10) }
          ]
        };
      }
    }

    let selfMini, geoMini, selfTimeline, geoLarge;

    function ensureChart(ctx, type, data, options) {
      if (ctx.__chart) { ctx.__chart.data = data; ctx.__chart.options = options || {}; ctx.__chart.update(); return ctx.__chart; }
      ctx.__chart = new Chart(ctx, { type, data, options });
      return ctx.__chart;
    }

    async function syncSelfcheck() {
      const data = await fetchSelfcheck();
      const updatedLabel = '업데이트: ' + new Date().toLocaleString();
      document.getElementById('selfcheck-updated').textContent = updatedLabel;

      const miniLabels = data.timeline.slice(-6).map(i => (i.hour + '시'));
      const miniValues = data.timeline.slice(-6).map(i => i.users);

      selfMini = ensureChart(
        document.getElementById('selfcheck-mini').getContext('2d'),
        'bar',
        {
          labels: miniLabels,
          datasets: [{ label: '시간대 요약', data: miniValues }]
        },
        { responsive:true, maintainAspectRatio:false }
      );

      const geoLabels = data.regions.map(r => r.name);
      const geoValues = data.regions.map(r => r.users);
      geoMini = ensureChart(
        document.getElementById('geo-mini').getContext('2d'),
        'doughnut',
        { labels: geoLabels, datasets: [{ label:'지역', data: geoValues }] },
        { responsive:true, maintainAspectRatio:false, cutout: '60%' }
      );

      selfTimeline = ensureChart(
        document.getElementById('selfcheck-timeline').getContext('2d'),
        'line',
        { labels: data.timeline.map(i => (i.hour + '시')), datasets: [{ label:'시간대별 접속', data: data.timeline.map(i => i.users) }] },
        { responsive:true, maintainAspectRatio:false, tension:.35 }
      );

      geoLarge = ensureChart(
        document.getElementById('geo-large').getContext('2d'),
        'bar',
        { labels: geoLabels, datasets: [{ label:'지역별 접속', data: geoValues }] },
        { responsive:true, maintainAspectRatio:false }
      );
    }

    document.getElementById('openSelfcheck').addEventListener('click', () => {
      document.getElementById('selfcheck-modal').classList.add('open');
      setTimeout(() => {
        if (selfTimeline) selfTimeline.resize();
        if (geoLarge) geoLarge.resize();
      }, 50);
    });
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('selfcheck-modal').classList.remove('open');
    });

    (async function boot() {
      await syncWalletDonation();
      await syncSelfcheck();
      setInterval(syncWalletDonation, 5 * 60 * 1000);
      setInterval(syncSelfcheck, 5 * 60 * 1000);
    })();
  </script>
</body>
</html>
