  <script>
    (function(){
      function norm(u){
        u = (u||"").toString().trim().toLowerCase().split('#')[0].split('?')[0];
        var f = u.split('/').pop();
        if(f === '' || f === 'index.html') f = 'home.html';
        f = f.replace(/_ko\.html$|_en\.html$|_zh\.html$/,'.html');
        return f;
      }
      var current = norm(location.pathname);
      document.querySelectorAll('.sidebar a[href]').forEach(function(a){
        var href = norm(a.getAttribute('href')||'');
        if(href && href === current){
          a.classList.add('active');
          a.setAttribute('aria-current','page');
        }
      });
    })();
  </script>

<script id="hide-lit-links-script">
(function(){
  function hideLitLinks(){
    try{
      var links = document.querySelectorAll('nav a, aside a, .sidebar a, .side a, a');
      for(var i=0;i<links.length;i++){
        var a = links[i];
        var txt = (a.textContent || '').trim();
        var href = (a.getAttribute('href') || '').trim();

        if (href.includes('literature_academic') || (txt.includes('문학') && txt.includes('학술'))) {
          a.setAttribute('aria-hidden','true');
          a.setAttribute('tabindex','-1');
          a.classList.add('is-hidden-lit');
          a.style.display = 'none';
        }
      }
    }catch(e){/* silent */}
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', hideLitLinks, {once:true});
  } else {
    hideLitLinks();
  }
})();
</script>

<script id="social-main-tracking-hooks-v1">
(function(){
  if (window.__SOCIAL_MAIN_TRACKING_READY__) return;
  window.__SOCIAL_MAIN_TRACKING_READY__ = true;

  window.__SOCIAL_TRACK_BUFFER__ = window.__SOCIAL_TRACK_BUFFER__ || [];

  function nowISO(){
    return new Date().toISOString();
  }

  function getCardPayload(card){
    if(!card) return null;

    var grid = card.closest('.thumb-grid[data-psom-key]');
    var sectionKey = grid ? (grid.getAttribute('data-psom-key') || '') : '';
    var titleEl = card.querySelector('.title');
    var descEl  = card.querySelector('.desc');
    var href    = card.getAttribute('href') || '#';

    return {
      event_id: 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
      page: 'social',
      section_key: sectionKey,
      title: titleEl ? (titleEl.textContent || '').trim() : '',
      desc: descEl ? (descEl.textContent || '').trim() : '',
      href: href,
      ts: nowISO()
    };
  }

  function pushEvent(type, payload){
    var eventPayload = Object.assign({ type: type }, payload || {});
    window.__SOCIAL_TRACK_BUFFER__.push(eventPayload);

    try{
      window.dispatchEvent(new CustomEvent('IGDC_SOCIAL_TRACK', {
        detail: eventPayload
      }));
    }catch(_){}

    try{
      window.postMessage({
        type: 'IGDC_SOCIAL_TRACK',
        payload: eventPayload
      }, '*');
    }catch(_){}
  }

  /* 1) 카드 클릭 추적 */
 document.addEventListener('click', function(e){
  var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
  if(!card) return;

  var grid = card.closest('.thumb-grid[data-psom-key]');
  var key = grid ? (grid.getAttribute('data-psom-key') || '') : '';

  var payload = getCardPayload(card);
  if(!payload) return;

  pushEvent('card_click', payload);

  if(key && key !== 'rightPanel'){
    return;
  }

  if ((payload.href || '#') === '#'){
    e.preventDefault();
    try{
      alert('內容或素材正在準備中。');
    }catch(_){}
  }
}, { passive:false });

  /* 2) 카드 노출(첫 진입 1회만) */
  function bindImpressionObserver(){
    if (!('IntersectionObserver' in window)) return;

    var seen = new WeakSet();
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if (!entry.isIntersecting) return;
        var card = entry.target;
        if (seen.has(card)) return;
        seen.add(card);

        var payload = getCardPayload(card);
        if(!payload) return;
        pushEvent('card_impression', payload);
      });
    }, {
      root: null,
      rootMargin: '0px',
      threshold: 0.35
    });

    document.querySelectorAll('.thumb-grid[data-psom-key] a.card').forEach(function(card){
      io.observe(card);
    });
  }

  /* 3) 카드 체류/시청 시작 훅 */
  function bindHoverWatchHooks(){
    var activeMap = new WeakMap();

    document.addEventListener('mouseenter', function(e){
      var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
      if(!card) return;
      activeMap.set(card, Date.now());
    }, true);

    document.addEventListener('mouseleave', function(e){
      var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
      if(!card) return;

      var started = activeMap.get(card);
      if(!started) return;

      var sec = Math.max(0, Math.round((Date.now() - started) / 1000));
      activeMap.delete(card);

      var payload = getCardPayload(card);
      if(!payload) return;
      payload.watch_time_sec = sec;

      pushEvent('card_watch_time', payload);
    }, true);
  }

function bindTouchWatchHooks(){
  var activeTouchMap = new WeakMap();

  document.addEventListener('touchstart', function(e){
    var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
    if(!card) return;
    activeTouchMap.set(card, Date.now());
  }, { passive:true });

  document.addEventListener('touchend', function(e){
    var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
    if(!card) return;

    var started = activeTouchMap.get(card);
    if(!started) return;

    var sec = Math.max(0, Math.round((Date.now() - started) / 1000));
    activeTouchMap.delete(card);

    var payload = getCardPayload(card);
    if(!payload) return;
    payload.watch_time_sec = sec;

    pushEvent('card_watch_time_touch', payload);
  }, { passive:true });

  document.addEventListener('touchcancel', function(e){
    var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
    if(!card) return;
    activeTouchMap.delete(card);
  }, { passive:true });

  window.__IGDC_SOCIAL_TOUCH_ACTIVE_MAP__ = activeTouchMap;
}

function bindVisibilityFlush(){
  function flushActiveTouchWatch(){
    var active = window.__IGDC_SOCIAL_TOUCH_ACTIVE_CARD__;
    var started = window.__IGDC_SOCIAL_TOUCH_ACTIVE_AT__;
    if(!active || !started) return;

    var sec = Math.max(0, Math.round((Date.now() - started) / 1000));
    var payload = getCardPayload(active);
    if(payload){
      payload.watch_time_sec = sec;
      pushEvent('card_watch_time_flush', payload);
    }

    window.__IGDC_SOCIAL_TOUCH_ACTIVE_CARD__ = null;
    window.__IGDC_SOCIAL_TOUCH_ACTIVE_AT__ = null;
  }

  document.addEventListener('touchstart', function(e){
    var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
    if(!card) return;
    window.__IGDC_SOCIAL_TOUCH_ACTIVE_CARD__ = card;
    window.__IGDC_SOCIAL_TOUCH_ACTIVE_AT__ = Date.now();
  }, { passive:true });

  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden'){
      flushActiveTouchWatch();
    }
  });

  window.addEventListener('pagehide', flushActiveTouchWatch);
  window.addEventListener('beforeunload', flushActiveTouchWatch);
}

function boot(){
  bindImpressionObserver();
  bindHoverWatchHooks();
  bindTouchWatchHooks();
  bindVisibilityFlush();
}

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot, { once:true });
  } else {
    boot();
  }

  /* automap이 나중에 카드 치환해도 다시 스캔 가능하게 공개 */
  window.__IGDC_SOCIAL_REBIND_TRACKING__ = function(){
  bindImpressionObserver();
  bindHoverWatchHooks();
  bindTouchWatchHooks();
  bindVisibilityFlush();
};
})();
</script>

<script id="social-track-sink-bridge-v1">
(function(){
  if (window.__IGDC_SOCIAL_TRACK_SINK_READY__) return;
  window.__IGDC_SOCIAL_TRACK_SINK_READY__ = true;

  var ENDPOINT = '/.netlify/functions/social-track';
  var TABLE = 'igdc_social_events';
  var FLUSH_SIZE = 10;
  var FLUSH_INTERVAL = 4000;
  var queue = [];
  var flushing = false;
  var timer = null;

  function nowISO(){
    return new Date().toISOString();
  }

  function getSupabaseClient(){
    try{
      var url = window.SUPER_VARSAR && window.SUPER_VARSAR.url;
      var key = window.SUPER_VARSAR && window.SUPER_VARSAR.anonKey;
      if(!url || !key || !window.supabase || !window.supabase.createClient) return null;

      if(!window.__IGDC_SOCIAL_TRACK_SB__){
        window.__IGDC_SOCIAL_TRACK_SB__ = window.supabase.createClient(url, key);
      }
      return window.__IGDC_SOCIAL_TRACK_SB__;
    }catch(_){
      return null;
    }
  }

  function normalizeEvent(ev){
    return {
      type: ev && ev.type || 'unknown',
      page: ev && ev.page || 'social',
      section_key: ev && ev.section_key || null,
      title: ev && ev.title || null,
      desc: ev && ev.desc || null,
      href: ev && ev.href || null,
      watch_time_sec: Number(ev && ev.watch_time_sec || 0),
      event_id: ev && ev.event_id || ('evt_' + Date.now() + '_' + Math.random().toString(36).slice(2,8)),
      ts: ev && ev.ts || nowISO(),
      raw: ev || {}
    };
  }

  function enqueue(ev){
    queue.push(normalizeEvent(ev));
    scheduleFlush();
  }

  function scheduleFlush(){
    if(queue.length >= FLUSH_SIZE){
      flush();
      return;
    }
    if(timer) return;
    timer = setTimeout(function(){
      timer = null;
      flush();
    }, FLUSH_INTERVAL);
  }

  async function sendToFunction(batch){
    try{
      var res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          page: 'social',
          events: batch
        })
      });
      if(!res.ok) throw new Error('http ' + res.status);
      return true;
    }catch(_){
      return false;
    }
  }

  async function sendToSupabase(batch){
    try{
      var sb = getSupabaseClient();
      if(!sb) return false;

      var rows = batch.map(function(ev){
        return {
          page: ev.page,
          section_key: ev.section_key,
          event_type: ev.type,
          title: ev.title,
          description: ev.desc,
          href: ev.href,
          watch_time_sec: ev.watch_time_sec,
          event_id: ev.event_id,
          event_ts: ev.ts,
          payload: ev.raw,
          created_at: nowISO()
        };
      });

      var out = await sb.from(TABLE).insert(rows);
      if(out && out.error) throw out.error;
      return true;
    }catch(_){
      return false;
    }
  }

  async function flush(){
    if(flushing) return;
    if(!queue.length) return;

    flushing = true;
    var batch = queue.splice(0, FLUSH_SIZE);

    var ok = await sendToFunction(batch);
    if(!ok){
      ok = await sendToSupabase(batch);
    }

    if(!ok){
      window.__SOCIAL_TRACK_FAILED__ = (window.__SOCIAL_TRACK_FAILED__ || []).concat(batch);
    }

    flushing = false;

    if(queue.length){
      scheduleFlush();
    }
  }

  window.addEventListener('IGDC_SOCIAL_TRACK', function(e){
    var detail = e && e.detail ? e.detail : null;
    if(!detail) return;
    enqueue(detail);
  });

  window.addEventListener('pagehide', function(){
    if(queue.length){
      try{
        navigator.sendBeacon(
          ENDPOINT,
          new Blob([JSON.stringify({ page:'social', events: queue })], { type:'application/json' })
        );
        queue = [];
      }catch(_){}
    }
  });

  window.__IGDC_SOCIAL_TRACK_FLUSH__ = flush;
  window.__IGDC_SOCIAL_TRACK_ENQUEUE__ = enqueue;
})();
</script>

<script id="rpMobileScroller-drag-wheel-v1">
(function(){
  function getScroller(){
    return document.getElementById('rpMobileScroller');
  }

  function isMobileOrTablet(){
    return window.matchMedia('(max-width:1023px)').matches;
  }

  function bindMobileScroller(){
    var scroller = getScroller();
    if(!scroller || scroller.dataset.dragWheelBound === '1') return;
    scroller.dataset.dragWheelBound = '1';

    /* 마우스 휠을 가로 스크롤로 전환 */
    scroller.addEventListener('wheel', function(e){
      if(!isMobileOrTablet()) return;
      if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
        scroller.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, { passive:false });

    /* 마우스 드래그 */
    var isDown = false;
    var startX = 0;
    var startLeft = 0;

    scroller.addEventListener('mousedown', function(e){
      if(!isMobileOrTablet()) return;
      if(e.button !== 0) return;
      isDown = true;
      startX = e.clientX;
      startLeft = scroller.scrollLeft;
      scroller.classList.add('dragging');
      e.preventDefault();
    });

    window.addEventListener('mousemove', function(e){
      if(!isDown) return;
      var dx = e.clientX - startX;
      scroller.scrollLeft = startLeft - dx;
    });

    window.addEventListener('mouseup', function(){
      if(!isDown) return;
      isDown = false;
      scroller.classList.remove('dragging');
    });

    /* 터치 상태에서 부모 세로 스크롤 간섭 최소화 */
    scroller.addEventListener('touchmove', function(e){
      if(!isMobileOrTablet()) return;
      e.stopPropagation();
    }, { passive:true });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bindMobileScroller, { once:true });
  } else {
    bindMobileScroller();
  }

  window.addEventListener('resize', bindMobileScroller, { passive:true });
})();
</script>

<script id="sn-desktop-antisquish-fallback-v2">
(function(){
  if (!window.matchMedia) return;

  function isDesktop(){
    return window.matchMedia('(min-width: 1024px)').matches;
  }

  function fixDistortion(root){
    if(!isDesktop()) return;

    var media = (root || document).querySelectorAll(
      '.thumb-card img, .thumb-card video, .card img, .card video'
    );

    media.forEach(function(m){
      var cw = m.clientWidth || 0;
      var ch = m.clientHeight || 0;
      var nw = m.naturalWidth || m.videoWidth || 0;
      var nh = m.naturalHeight || m.videoHeight || 0;

      if (cw <= 0 || nw <= 0 || nh <= 0) return;

      var r_dom = ch > 0 ? (cw / ch) : 0;
      var r_nat = nw / nh;

      if (r_dom > 0 && Math.abs(r_dom - r_nat) / r_nat > 0.2){
        m.style.height = Math.round(cw / r_nat) + 'px';
        m.style.objectFit = 'cover';
      }
    });
  }

  function schedule(){
    fixDistortion();
    [120, 360, 800].forEach(function(t){
      setTimeout(fixDistortion, t);
    });
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', schedule, { once:true });
  } else {
    schedule();
  }

  window.addEventListener('load', fixDistortion, { once:true });
  window.addEventListener('resize', function(){
    if(isDesktop()) fixDistortion();
  }, { passive:true });

  window.addEventListener('orientationchange', function(){
    if(isDesktop()) fixDistortion();
  }, { passive:true });
})();
</script>
 <script id="social-main-fullscreen-viewer-v1">
(function(){
  if(window.__SOCIAL_MAIN_FULLSCREEN_READY__) return;
  window.__SOCIAL_MAIN_FULLSCREEN_READY__ = true;

  function qs(sel, root){ return (root || document).querySelector(sel); }

  function ensureViewer(){
    var root = document.getElementById('snfvRoot');
    if(root) return root;

    root = document.createElement('div');
    root.id = 'snfvRoot';
    root.className = 'snfv';
    root.innerHTML =
      '<div class="snfv-panel">'
      + '<button type="button" class="snfv-close" aria-label="關閉">✕</button>'
      + '<div class="snfv-media" id="snfvMedia"></div>'
      + '<div class="snfv-meta">'
      +   '<div class="snfv-text"><div class="snfv-title" id="snfvTitle"></div><div class="snfv-desc" id="snfvDesc"></div></div>'
      +   '<div class="snfv-actions"><a id="snfvOpenBtn" class="snfv-btn" href="#" target="_blank" rel="noopener">開啟</a></div>'
      + '</div>'
      + '</div>';

    document.body.appendChild(root);

    qs('.snfv-close', root).addEventListener('click', closeViewer, { passive:true });
    root.addEventListener('click', function(e){
      if(e.target === root) closeViewer();
    }, { passive:true });

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape') closeViewer();
    });

    return root;
  }

  function getBgUrl(el){
    if(!el) return '';
    var bg = getComputedStyle(el).backgroundImage || '';
    var m = bg.match(/url\\(["']?(.*?)["']?\\)/);
    return m && m[1] ? m[1] : '';
  }

  function extractCardData(card){
    var pic = qs('.pic', card);
    var img = qs('img', card);
    var video = qs('video', card);
    var title = (qs('.title', card) && qs('.title', card).textContent || '').trim();
    var desc = (qs('.desc', card) && qs('.desc', card).textContent || '').trim();
    var href = (card.getAttribute('href') || '#').trim();

    return {
      title: title,
      desc: desc,
      href: href,
      img: img && img.src ? img.src : '',
      video: video && (video.currentSrc || video.src) ? (video.currentSrc || video.src) : '',
      poster: video && video.poster ? video.poster : '',
      bg: getBgUrl(pic)
    };
  }

  function openViewer(card){
    var data = extractCardData(card);
    var root = ensureViewer();
    var media = document.getElementById('snfvMedia');
    var title = document.getElementById('snfvTitle');
    var desc = document.getElementById('snfvDesc');
    var openBtn = document.getElementById('snfvOpenBtn');

    media.innerHTML = '';
    title.textContent = data.title || '預覽';
    desc.textContent = data.desc || '';

    if(data.video){
      var v = document.createElement('video');
      v.src = data.video;
      if(data.poster) v.poster = data.poster;
      v.controls = true;
      v.autoplay = true;
      v.playsInline = true;
      media.appendChild(v);
    }else if(data.img || data.bg){
      var im = document.createElement('img');
      im.src = data.img || data.bg;
      im.alt = data.title || 'preview';
      media.appendChild(im);
    }else{
      var fb = document.createElement('div');
      fb.className = 'snfv-fallback';
      fb.textContent = data.title || '預覽';
      media.appendChild(fb);
    }

    if(data.href && data.href !== '#'){
      openBtn.href = data.href;
      openBtn.style.display = 'inline-flex';
    }else{
      openBtn.href = '#';
      openBtn.style.display = 'none';
    }

    root.classList.add('open');

    var panel = qs('.snfv-panel', root);
    if(panel && panel.requestFullscreen){
      panel.requestFullscreen().catch(function(){});
    }
  }

  function closeViewer(){
    var root = document.getElementById('snfvRoot');
    if(root) root.classList.remove('open');
    if(document.fullscreenElement && document.exitFullscreen){
      document.exitFullscreen().catch(function(){});
    }
  }

  document.addEventListener('click', function(e){
    if(e.target && e.target.closest && e.target.closest('.rscroll')) return;

    var card = e.target.closest('.thumb-grid[data-psom-key] a.card');
    if(!card) return;

    var grid = card.closest('.thumb-grid[data-psom-key]');
    if(!grid) return;

    var key = grid.getAttribute('data-psom-key') || '';
    if(!key || key === 'rightPanel') return;

    e.preventDefault();
    e.stopPropagation();

    openViewer(card);
  }, true);
})();
</script>
