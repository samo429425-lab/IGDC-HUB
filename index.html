  (function(){

        document.dispatchEvent(new CustomEvent("IGDC_RESIZED"));

<script id="igdc-intl-helper">
// Minimal Intl helpers (non-intrusive)
(function(){
  if (window.IGDCIntl) return;
  function safeLocale(loc){ try{ return (loc||document.documentElement.lang||'en'); }catch(e){ return 'en'; } }
  window.IGDCIntl = {
    date(d, locale, opts){
      try{
        var dt = (d instanceof Date) ? d : new Date(d);
        return new Intl.DateTimeFormat(safeLocale(locale), Object.assign({ year:'numeric', month:'short', day:'2-digit' }, opts||{})).format(dt);
      }catch(e){ return String(d); }
    },
    number(n, locale, opts){
      try{ return new Intl.NumberFormat(safeLocale(locale), opts||{}).format(n); }catch(e){ return String(n); }
    },
    currency(n, currency, locale, opts){
      try{
        var o = Object.assign({ style:'currency', currency: currency||'USD', maximumFractionDigits:2 }, opts||{});
        return new Intl.NumberFormat(safeLocale(locale), o).format(n);
      }catch(e){ return String(n); }
    }
  };
})();
</script>

<script id="authbar-pin-v4-js">
(function(){
  function $(q){ return document.querySelector(q); }
  function byId(id){ return document.getElementById(id); }
  function px(n){ return Math.round(n) + 'px'; }
  function inHeader(el){
    var hdr = $('header'); if (!hdr || !el) return null;
    if (!hdr.contains(el)) hdr.insertBefore(el, hdr.firstChild);
    return hdr;
  }
  function lockLogin(){
    var login = byId('osLoginBtn'); if (!login) return null;
    var hdr = inHeader(login); if (!hdr) return null;
    // Preserve current visual spot relative to header
    var hb = hdr.getBoundingClientRect();
    var lb = login.getBoundingClientRect();
    login.style.position = 'absolute';
    login.style.left = px(Math.max(0, Math.round(lb.left - hb.left)));
    login.style.top  = px(Math.max(0, Math.round(lb.top  - hb.top )));
    return {hdr, rect:{left:lb.left-hb.left, top:lb.top-hb.top, width:lb.width, height:lb.height}};
  }
  function lockRole(loginInfo){
    var role = byId('roleStatusBtn') || byId('igtcRoleInline3'); if (!role) return;
    var hdr = inHeader(role); if (!hdr) return;
    // Force inline override to beat any prior CSS (including injected roleStatusBtn-style)
    role.style.position = 'absolute';
    // Align flush to login's right edge (0px gap)
    var L = loginInfo && loginInfo.rect;
    if (L){
      role.style.left = px(Math.max(0, Math.round(L.left + L.width + 0)));
      role.style.top  = px(Math.max(0, Math.round(L.top)));
    } else {
      // Fallback: keep its current spot but absolute within header
      var hb = hdr.getBoundingClientRect();
      var rb = role.getBoundingClientRect();
      role.style.left = px(Math.max(0, Math.round(rb.left - hb.left)));
      role.style.top  = px(Math.max(0, Math.round(rb.top  - hb.top )));
    }
  }
  function run(){
    try{
      var info = lockLogin();
      lockRole(info);
    }catch(e){}
  }
  if (document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', run, { once:true }); } else { run(); }
  // Keep consistent even if other scripts re-style or rename (#igtcRoleInline3 -> #roleStatusBtn)
  window.addEventListener('resize', function(){ requestAnimationFrame(run); });
  try{ new MutationObserver(function(){ run(); }).observe(document.documentElement, { childList:true, subtree:true }); }catch(_){}
})();
</script>

<script id="igdc-admin-post-btn">
(function(){
  // 허용 롤
  const OK = /^(admin|director|sitemanager[_-]?director)$/i;

  function getRoles(){
    try{
      const p = (window.osAuth && osAuth.getIdTokenPayload && osAuth.getIdTokenPayload()) || {};
      const arr = (p['https://example.com/roles'] || []).map(String);
      return arr.map(r=>r.toLowerCase());
    }catch(e){ return []; }
  }

  function hasPrivilege(){
    const roles = getRoles();
    return roles.some(r => OK.test(r));
  }

  function insertButton(){
    if (!hasPrivilege()) return;

    // 모달 DOM이 뜨면 상단 액션 바를 찾아서 버튼 삽입
    const dialog = document.querySelector(
      '[role="dialog"], .modal-content, .seller-modal, .os-modal'
    );
    if (!dialog || dialog.__adminPostBtn) return;

    // '공지사항' 헤더/툴바 근처 추적 (fallback로 모달 본문 상단)
    const header = dialog.querySelector('.modal-header, header, .head, .title, h2, h3') || dialog;
    const bar = dialog.querySelector('.btn-area, .actions, .toolbar') || header;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-primary admin-post-btn';
    btn.textContent = '운영자 공지 쓰기';
    btn.style.marginLeft = '8px';
    btn.addEventListener('click', function(){
      const lang = (document.documentElement.lang || 'en').toLowerCase();
      const url = '/admin-post.html?lang=' + encodeURIComponent(lang);
      window.open(url, '_blank', 'noopener');
    });

    (bar || header).appendChild(btn);
    dialog.__adminPostBtn = true;
  }

  // 회원전용 모달 트리거(예: #mo-btn, .js-seller-modal-trigger) 클릭 후 삽입 시도
  document.addEventListener('click', function(e){
    const t = e.target && e.target.closest('.js-seller-modal-trigger, #mo-btn');
    if (t) setTimeout(insertButton, 150);
  });

  // 혹시 모달이 비동기로 붙을 수 있어 MutationObserver로 백업
  try{
    new MutationObserver(insertButton).observe(document.body, {childList:true, subtree:true});
  }catch(e){}
})();
</script>

<script>
(function(){

  const logoutBtnSelectorList = ['[data-os-logout]','#logoutBtn','.btn-logout','a[href*="logout"]','button[onclick*="logout"]'];

  const $$ = (sel) => Array.from(document.querySelectorAll(sel));
  function findFirst(list){
    for(const s of list){ const el = document.querySelector(s); if (el) return el; }
    return null;
  }

  // Toast under login button
  function placeToastUnderLogin(){
    const toast = document.getElementById('os-toast');
    const btn = findFirst(loginBtnSelectorList);
    if(!toast || !btn) return;
    const rect = btn.getBoundingClientRect();
    const docY = window.scrollY || document.documentElement.scrollTop || 0;
    const docX = window.scrollX || document.documentElement.scrollLeft || 0;
    toast.style.top  = (rect.bottom + 8 + docY) + 'px';
    toast.style.left = (rect.left + rect.width/2 + docX) + 'px';
    toast.style.transform = 'translateX(-50%)';
  }
  function showToast(msg, ms=2200){
    const el = document.getElementById('os-toast'); if(!el) return;
    el.textContent = msg;
    placeToastUnderLogin();
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.style.display='none'; }, ms);
  }
  window.addEventListener('resize', placeToastUnderLogin);
  window.addEventListener('scroll', placeToastUnderLogin, { passive:true });

  // Modal confirm
  function confirmLogout(){
    return new Promise(resolve => {
      const mask = document.getElementById('os-modal-mask');
      const box  = document.getElementById('os-modal');
      const ok   = document.getElementById('os-modal-ok');
      const no   = document.getElementById('os-modal-cancel');
      const off = () => { mask.style.display='none'; box.style.display='none'; ok.onclick=no.onclick=null; };
      mask.style.display='block'; box.style.display='block';
      ok.onclick = () => { off(); resolve(true); };
      no.onclick = () => { off(); resolve(false); };
      mask.onclick = no.onclick;
    });
  }

  // Token helpers (support window.osAuth or window.osauth or localStorage)
  function getIdToken(){
    try{
      if (window.osAuth && typeof window.osAuth.getIdToken === 'function') return window.osAuth.getIdToken();
      if (window.osAuth && typeof window.osAuth.getIdTokenPayload === 'function'){
        // some libs only expose payload
        return null;
      }
      if (window.osauth && window.osauth.id_token) return window.osauth.id_token;
      const ls = localStorage.getItem('id_token') || localStorage.getItem('os_id_token');
      if (ls) return ls;
    }catch(_){}
    return null;
  }
  function getIdPayload(){
    try{
      if (window.osAuth && typeof window.osAuth.getIdTokenPayload === 'function'){
        return window.osAuth.getIdTokenPayload();
      }
      const t = getIdToken();
      if (!t) return null;
      return JSON.parse(atob(t.split('.')[1]));
    }catch(_){ return null; }
  }
  function getRolesFromPayload(pay){
    const out = new Set();
    if (!pay) return out;
    for (const key of ROLE_KEYS){
      const v = pay[key];
      if (Array.isArray(v)) v.forEach(r=>out.add(String(r).toLowerCase()));
      else if (typeof v === 'string') v.split(',').forEach(r=>out.add(r.trim().toLowerCase()));

  }

    try{

    return !!getIdPayload();

  // Gate UI (admin nav & [data-role~="admin"])
  function applyGate(){
    const authed = isAuthed();
    const adminOK = authed && isAdmin();
    // Admin menu by data-role
    document.querySelectorAll('[data-role~="admin"]').forEach(el => {
      el.style.display = adminOK ? '' : 'none';
    });
    // Fallback: 8th nav link (if exists)
    try{
      const links = Array.from(document.querySelectorAll('nav a'));
      if (links[7]) links[7].style.display = adminOK ? '' : 'none';
    }catch(_){}
  }

  document.addEventListener('osauth:ready', function(){
    applyGate();
    showToast('Logged in');
  }, { once: true });

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', applyGate);
  } else { applyGate(); }

  // Strong logout intercept (capture phase)
  document.addEventListener('click', async function(ev){
    const t = ev.target.closest(logoutBtnSelectorList.join(','));
    if(!t) return;
    ev.preventDefault(); ev.stopImmediatePropagation(); ev.stopPropagation();
    const ok = await confirmLogout();
    if(!ok) return;

      if (window.osAuth && typeof window.osAuth.logout === 'function') window.osAuth.logout();
      if (window.osauth && typeof window.osauth.logout === 'function') window.osauth.logout();

      localStorage.removeItem('os_id_token');
      localStorage.removeItem('access_token');
      localStorage.removeItem('os_access_token');

    setTimeout(()=>location.reload(), 600);
  }, true);

  try{
    const lb = document.getElementById('osLoginBtn');
    if (lb) lb.setAttribute('data-os-login','1');
  }catch(_){}

})();</script>

<script>
(function(){
  if (window.__IGTC_ROLE_INLINE3__) return; window.__IGTC_ROLE_INLINE3__=true;
  const ROLE_KEYS = ["https://example.com/roles","https://osu/roles","roles","permissions"];

  function b64uDecode(s){
    try{ s=(s||"").replace(/-/g,"+").replace(/_/g,"/"); const pad=s.length%4; if(pad) s+="=".repeat(4-pad);
      const bin=atob(s); try{ return new TextDecoder("utf-8").decode(Uint8Array.from(bin,c=>c.charCodeAt(0))); }catch(_){ return bin; } }
    catch(e){ return "{}"; }
  }
  function parseJwtPayload(t){
    if(!t||typeof t!=="string") return {}; const p=t.split("."); if(p.length<2) return {};
    try{ return JSON.parse(b64uDecode(p[1])); }catch(e){ return {}; }
  }
  function getIdToken(){
    try{ if(window.osAuth && typeof window.osAuth.getIdTokenPayload==="function"){
      const p=window.osAuth.getIdTokenPayload(); if(p && p.__raw) return p.__raw; } }catch(_){}
    const keys=["osauth.tokens.v2","osauth:id_token","id_token","auth0:id_token","auth.idToken"];
    for(const k of keys){
      try{
        const v=(k==="osauth.tokens.v2")? (JSON.parse(localStorage.getItem(k)||"null")||{}).id_token : localStorage.getItem(k);
        if(v && v.split(".").length>=2) return v;
      }catch(_){}
    }
    return "";
  }
  function extractRoles(payload){
    let roles=[];
    for(const key of ROLE_KEYS){
      const v=payload && payload[key];
      if(!v) continue;
      if(Array.isArray(v)) roles=roles.concat(v);
      else if(typeof v==="string") roles=roles.concat(v.split(",").map(s=>s.trim()));
    }
    roles=roles.map(r=>String(r||"").toLowerCase());
    return Array.from(new Set(roles));
  }

  function computeText(){
    const token = getIdToken();
    if (!token) return "guest"; // not logged in => always guest

    const payload = parseJwtPayload(token);
    const roles = extractRoles(payload);

    // logged-in fallback: if roles missing/empty => 'member'
    if (!roles || roles.length===0) return "member";

    // if Auth0 didn't include known roles but something exists, still prefer 'member'
    const known = ["admin","director","site_manager","special_member","member","guest"];
    const hasKnown = roles.some(r => known.includes(r) || r.startsWith("site_manager.") || r.startsWith("member.") || r.startsWith("commerce_manager."));
    if (!hasKnown) return "member";

    // normal mapping
    if (roles.includes("admin")) return "admin";
    if (roles.includes("director")) return "director";
    if (roles.includes("site_manager") || roles.some(r=>r.startsWith("site_manager."))) return "site_manager";
    if (roles.includes("special_member")) return "special_member";
    if (roles.includes("member") || roles.some(r=>r.startsWith("member."))) return "member";
    return "guest";
  }

  function render(){
    const el = document.getElementById("igtcRoleText3");
    if (!el) return;
    el.textContent = computeText();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", render); else render();
  document.addEventListener("osauth:ready", render);
  window.addEventListener("focus", render);
})();
</script>

<!-- IGDC Pinset Patch: language persist + double-reload guard (non-destructive) -->
<script>
(function(){
  // ===== 1) Language persist (save & restore) =====
  var LANG_KEY = "igdc_lang";
  function q(sel){ try{ return document.querySelector(sel); } catch(_) { return null; } }
  function getPicker(){ return q(".language-select"); }
  function detectPref(){
    var sel = getPicker();
    if(sel && sel.value) return sel.value;
    var htmlLang = (document.documentElement && document.documentElement.lang)||"";
    if(htmlLang) return htmlLang;
    try { return (navigator.language || "en").split("-")[0]; } catch(_) { return "en"; }
  }
  function applyLang(lang){
    if(!lang) return;
    try{
      var sel = getPicker(); if(sel) sel.value = lang;
      if(document.documentElement) document.documentElement.setAttribute("lang", lang);
      // Prefer IGDC_LANG if present
      if (window.IGDC_LANG && typeof window.IGDC_LANG.changeLanguage === "function"){
        window.IGDC_LANG.changeLanguage(lang);
      } else if (window.__IGDC_LANG__ && typeof window.__IGDC_LANG__.changeLanguage === "function"){
        window.__IGDC_LANG__.changeLanguage(lang);
      } else if (typeof window.changeLanguage === "function"){
        window.changeLanguage(lang);
      }
    }catch(e){}
  }
  // Save on login button click
  document.addEventListener("click", function(e){
    var btn = e.target && e.target.closest ? e.target.closest("#osLoginBtn") : null;
    if(!btn) return;
    try{
      var sel = (document.querySelector(".language-select")||{});
      if (sel && sel.value) localStorage.setItem(LANG_KEY, sel.value);
    }catch(_){}
  }, true);
  // Restore on boot and on auth events
  function restore(){ try{ applyLang(localStorage.getItem(LANG_KEY) || detectPref()); }catch(_){ } }
  document.addEventListener("DOMContentLoaded", restore);
  document.addEventListener("osauth:ready", restore);
  document.addEventListener("osauth:done", restore, true);

  // ===== 2) Double-reload guard around Auth0 callbacks =====
  (function(){
    var doneOnce = false;
    // Stop duplicate 'message' events bubbling 'osauth:done'
    window.addEventListener("message", function(ev){
      try{
        if (ev && ev.data === "osauth:done"){
          if (doneOnce){ ev.stopImmediatePropagation && ev.stopImmediatePropagation(); ev.stopPropagation && ev.stopPropagation(); return; }
          doneOnce = true;
          setTimeout(function(){ doneOnce = false; }, 1500);
        }
      }catch(_){}
    }, true);

    // Debounce location.reload() while auth completes
    (function(){
      var origReload = location.reload;
      var last = 0;
      Object.defineProperty(location, "reload", {
        configurable: true,
        writable: true,
        value: function(){
          var now = Date.now();
          if (now - last < 1200) { return; } // ignore rapid repeats
          last = now;
          try { return origReload.apply(location, arguments); } catch(e){}
        }
      });
    })();

    // Soft-block rapid redirect loop to "/index.html" immediately after token exchange
    (function(){
      var origAssign = location.assign.bind(location);
      var origReplace= location.replace.bind(location);
      function shouldBlock(url){
        try{
          var u = new URL(url, location.href);
          return (u.pathname === "/index.html" && (performance.now() < 2000));
        }catch(_){ return false; }
      }
      location.assign = function(url){ if(shouldBlock(url)) return; return origAssign(url); };
      location.replace= function(url){ if(shouldBlock(url)) return; return origReplace(url); };
    })();
  })();
})();
</script>
<!-- IGDC Unified Token/Role + Payment Bridge (inline, single-file) -->
<script>
(function(){
  // ===== Token helpers (Auth0 local storage v2) =====

  // ===== Currency resolver =====
  function parseQueryCurrency(){
    try{
      const u = new URL(String(location.href));
      const c = u.searchParams.get("currency");
      return c ? c.trim().toUpperCase() : null;
    }catch(_){ return null; }
  }
  function langHints(){
    const out = [];
    try{ const htmlLang = (document.documentElement && document.documentElement.lang) || ""; if (htmlLang) out.push(htmlLang); }catch(_){}
    try{ if (navigator && navigator.language) out.push(navigator.language); }catch(_){}
    try{ if (navigator && Array.isArray(/* removed */)) out.push(./* removed */); }catch(_){}
    return out.map(s=>String(s).toLowerCase());
  }
  function mapLangToCurrency(code){
    // Core set only: USD, EUR, KRW, JPY, CNY, GBP (extendable)
    if (!code) return null;
    if (code.startsWith("ko")) return "KRW";
    if (code.startsWith("ja")) return "JPY";
    if (code.startsWith("zh")) return "CNY";
    if (code.startsWith("en-us")) return "USD";
    if (code.startsWith("en-gb")) return "GBP";
    if (code.startsWith("en")) return "USD";
    if (code.startsWith("fr")) return "EUR";
    if (code.startsWith("de")) return "EUR";
    if (code.startsWith("es")) return "EUR";
    if (code.startsWith("it")) return "EUR";
    if (code.startsWith("pt")) return "EUR";
    if (code.startsWith("ru")) return "EUR";
    return null;
  }
  let __DEFAULT_CCY = (function(){
    const q = parseQueryCurrency();
    if (q) return q;
    const hints = langHints();
    for (const h of hints){
      const m = mapLangToCurrency(h);
      if (m) return m;
    }
    return "USD";
  })();
  window.IGDC = window.IGDC || {};
  window.IGDC.getCurrency = function(){ return __DEFAULT_CCY; };
  window.IGDC.setCurrency = function(ccy){
    if (typeof ccy === "string" && /^[A-Z]{3,4}$/.test(ccy)) __DEFAULT_CCY = ccy.toUpperCase();
  };

  const STORAGE = { TOKENS:"osauth.tokens.v2" };
  function load(name){ try{ return JSON.parse(localStorage.getItem(name)||"null"); }catch(_){ return null; } }
  function getTokens(){ return load(STORAGE.TOKENS); }
  function getAccessToken(){ const t=getTokens(); return t ? (t.access_token||null) : null; }
  function getIdPayload(){
    const t=getTokens(); if(!t || !t.id_token) return null;
    try{ const p=t.id_token.split('.')[1]; const s=p.replace(/-/g,'+').replace(/_/g,'/'); const pad=s.length%4; 
      const b64 = s + (pad? '='.repeat(4-pad):''); 
      return JSON.parse(atob(b64));
    }catch(_){ return null; }
  }
  // ===== Role detection (7-level) =====
  const ROLE_KEYS = ["https://example.com/roles","https://osu/roles","roles","permissions","role"];
  function roleFromPayload(pay){
    const out = new Set();
    if(!pay) return "guest";
    for(const k of ROLE_KEYS){
      const v = pay[k];
      if(Array.isArray(v)) v.forEach(r=>out.add(String(r).toLowerCase()));
      else if(typeof v === "string") v.split(",").forEach(r=>out.add(r.trim().toLowerCase()));
    }
    if(out.has("admin")) return "admin";
    if(out.has("director")) return "director";
    if(out.has("siteadmin")) return "siteAdmin";
    if(out.has("special")) return "special";
    if(out.has("commerceadmin")) return "commerceAdmin";
    if(out.has("member")) return "member";
    return "guest";
  }
  function applyAdminGate(){
    try{
      const pay = getIdPayload();
      const role = roleFromPayload(pay);
      // Hide admin nav (8th link) for non-admins
      const links = document.querySelectorAll('nav a');
      if (links[7]) links[7].style.display = (role === "admin") ? "" : "none";
      // Inline role badge, if present
      const badge = document.getElementById("igtcRoleText3");
      if (badge) badge.textContent = role || "guest";
      // data-role gates
      document.querySelectorAll("[data-role]").forEach(el=>{
        const need = (el.getAttribute("data-role")||"").toLowerCase();
        el.style.display = (!need || need===role || role==="admin") ? "" : "none";
      });
    }catch(_){}
  }
  document.addEventListener("DOMContentLoaded", applyAdminGate);
  document.addEventListener("osauth:ready", applyAdminGate);

  // ===== Payment Bridge =====
  // Policy: 
  // - If current iframe page includes 'donation' (case-insensitive), allow guest (no token) up to 5~50 USD.
  // - Other pages require a bearer access token.
  const DONATION_MIN = 5, DONATION_MAX = 50;
  function isDonationContext(){
    try{
      const f = document.getElementById("mainFrame");
      const src = (f && f.getAttribute("src")) || "";
      return /donation/i.test(src);
    }catch(_){ return false; }
  }
  async function forwardToAdmin(payload){
    const pg = String(location.pathname||"/index.html");
    const ua = (navigator && navigator.userAgent) || "";
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
    const lang = (document.documentElement && document.documentElement.lang) || "en";

    const amount = Number(payload && payload.amount || 0);
    let currency = String((payload && payload.currency) || (__DEFAULT_CCY||\"USD\")).toUpperCase().slice(0,4);
    const memo = String((payload && payload.memo) || "Donation").slice(0,140);
    const meta = Object.assign({}, payload && payload.meta || {});

    // Token policy
    const token = getAccessToken();
    const inDonation = isDonationContext();
    if (!inDonation){
      if (!token){ throw new Error("AUTH_REQUIRED"); }
    } else {
      if (!(amount >= DONATION_MIN && amount <= DONATION_MAX)){
        throw new Error("DONATION_LIMIT"); // client-side guard
      }
    }

    const body = {
      amount, currency, memo, meta,
      context: { page: (document.getElementById("mainFrame")||{}).src || pg, locale: lang, tz, ua },
      token: token || null,
      guest: (!!inDonation && !token) ? true : false
    };

    const res = await fetch("/admin/api/payment-intent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(body)
    });
    if(!res.ok){
      let msg = "REQUEST_FAILED";
      try{ const j = await res.json(); msg = j && j.error || msg; }catch(_){}
      throw new Error(msg);
    }
    return await res.json();
  }

  // Expose API
  window.IGDC = window.IGDC || {};
  window.IGDC.requestPayment = function(opts){ return forwardToAdmin(opts||{}); };

  // Iframe message bridge for front pages
  window.addEventListener("message", async (ev)=>{
    try{
      const d = ev && ev.data || {};
      if (d && d.type === "IGDC_REQUEST_PAYMENT"){
        const res = await forwardToAdmin(d.payload||{});
        ev.source && ev.source.postMessage({ type:"IGDC_PAYMENT_RESULT", ok:true, result:res }, "*");
      }
    }catch(e){
      try{ ev.source && ev.source.postMessage({ type:"IGDC_PAYMENT_RESULT", ok:false, error:String(e && e.message || e) }, "*"); }catch(_){}
    }
  }, false);

})();
</script>

<script>
(function(){
  'use strict';
  const IGDC_REVERSE_LOCK = false; // single-scroll: parent only
  if (!IGDC_REVERSE_LOCK) return;

  var MIN = 200;
  var ALPHA = 200;
  var SEL = '#mainFrame, iframe';
  function q(sel){ return document.querySelector(sel); }
  function isSameOrigin(frame){ try{ void frame.contentDocument; return true; }catch(e){ return false; } }
  function setParentOverflow(hidden){
    try{
      var v = hidden ? 'hidden' : 'auto';
      document.documentElement.style.overflow = v;
      if (document.body) document.body.style.overflow = v;
    }catch(_){}
  }
  function ensureFrameStyles(frame){
    frame.style.display = 'block';
    frame.style.border = '0';
    if (!frame.style.width) frame.style.width = '100%';
  }
  function setFrame100vh(frame){
    frame.style.setProperty('height', '100vh', 'important');
    try{ frame.setAttribute('scrolling','auto'); }catch(_){}
    frame.style.overflow = 'auto';
  }
  function childNeedsScroll(frame){
    try{
      var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      var de = doc && doc.documentElement, bo = doc && doc.body;
      var viewport = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
      var h = Math.max(
        (de && de.scrollHeight) || 0,
        (bo && bo.scrollHeight) || 0,
        (de && de.getBoundingClientRect ? de.getBoundingClientRect().height : 0) || 0,
        (bo && bo.getBoundingClientRect ? bo.getBoundingClientRect().height : 0) || 0
      );
      return h > Math.max(MIN, viewport);
    }catch(_){ return null; }
  }
  function apply(frame){
    ensureFrameStyles(frame);
    var same = isSameOrigin(frame);
    if (!same){
      setParentOverflow(false);
      var viewport = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
      frame.style.setProperty('height', Math.max(MIN, viewport + ALPHA) + 'px', 'important');
      return;
    }
    var need = childNeedsScroll(frame);
    if (need === null){
      setParentOverflow(false);
      var viewport = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
      frame.style.setProperty('height', Math.max(MIN, viewport + ALPHA) + 'px', 'important');
      return;
    }
    if (need){
      setParentOverflow(true);
      setFrame100vh(frame);
    }else{
      setParentOverflow(false);
      try{
        var doc = frame.contentDocument || frame.contentWindow.document;
        var de = doc.documentElement, bo = doc.body;
        var h = Math.max(
          (de && de.scrollHeight) || 0,
          (bo && bo.scrollHeight) || 0,
          (de && de.offsetHeight) || 0,
          (bo && bo.offsetHeight) || 0
        );
        frame.style.setProperty('height', Math.max(MIN, Math.round(h||0) + ALPHA) + 'px', 'important');
      }catch(_){
        var viewport = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
        frame.style.setProperty('height', Math.max(MIN, viewport + ALPHA) + 'px', 'important');
      }
    }
  }
  function init(){
    var frame = q(SEL);
    if (!frame) return;
    apply(frame);
    frame.addEventListener('load', function(){ apply(frame); });
    window.addEventListener('resize', function(){ apply(frame); }, { passive:true });
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init, { once:true });
  } else { init(); }
})();
</script>

<script id="igdc-navtoggle-js">
(function(){
  try{
    function headerHeight(){
      var h = document.querySelector('header');
      if(!h) return 0;
      var r = h.getBoundingClientRect();
      return Math.max(0, Math.round(r.height));
    }
    function setHeaderVar(){
      var hh = headerHeight();
      document.body.style.setProperty('--igdc-header-h', hh + 'px');
    }
    function ensureButton(){
      var nav = document.querySelector('nav');
      if(!nav) return null;
      var btn = document.getElementById('igdcNavToggleBtn');
      if(!btn){
        btn = document.createElement('button');
        btn.type = 'button';
        btn.id = 'igdcNavToggleBtn';
        btn.textContent = '▲ 숨김';
        nav.appendChild(btn);
        btn.addEventListener('click', function(){
          var collapsed = document.body.classList.toggle('igdc-collapsed');
          btn.textContent = collapsed ? '▼ 펼침' : '▲ 숨김';
          // recompute in case responsive layout changed heights
          setTimeout(setHeaderVar, 20);
        });
      }
      return btn;
    }
    function init(){
      setHeaderVar();
      ensureButton();
    }
    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('load', init);
    window.addEventListener('resize', setHeaderVar);

    // Also refresh header height after iframe navigation settles (if present)
    document.addEventListener('DOMContentLoaded', function(){
      var frame = document.getElementById('mainFrame') || document.querySelector('iframe');
      if (frame){
        frame.addEventListener('load', function(){
          setTimeout(setHeaderVar, 60);
        });
      }
    });
  }catch(e){ console.warn('IGDC nav toggle init error', e); }
})();
</script>

<script id="igdc-postmsg-toggle-js">
(function(){
  try{
    // ---- i18n dictionary (basic) ----
    var I18N = {
      ko:{ hide:"▲ 숨김", show:"▼ 펼침" },
      en:{ hide:"▲ Hide", show:"▼ Show" },
      ja:{ hide:"▲ 隠す", show:"▼ 表示" },
      zh:{ hide:"▲ 隐藏", show:"▼ 显示" }
    };
    function lang2(){
      try{
        if (window.currentLang) return String(window.currentLang).slice(0,2).toLowerCase();
        var hl=(document.documentElement.getAttribute('lang')||'').slice(0,2).toLowerCase();
        return hl||'en';
      }catch(_){ return 'en'; }
    }
    function setHeaderVar(){
      try{
        var h=document.querySelector('header');
        var hh=h?Math.max(0,Math.round(h.getBoundingClientRect().height)):0;
        document.body.style.setProperty('--igdc-header-h', hh+'px');
      }catch(_){}
    }
    function ensureBtn(){
      var nav=document.querySelector('nav'); if(!nav) return null;
      var btn=document.getElementById('igdcNavToggleBtn');
      if(!btn){
        btn=document.createElement('button'); btn.type='button'; btn.id='igdcNavToggleBtn';
        nav.appendChild(btn);
        btn.addEventListener('click', function(){
          setCollapsed(!document.body.classList.contains('igdc-collapsed'));
        });
      }
      return btn;
    }
    function localize(){
      var btn=ensureBtn(); if(!btn) return;
      var L=lang2(); var d=I18N[L]||I18N.en;
      var collapsed=document.body.classList.contains('igdc-collapsed');
      btn.textContent = collapsed ? d.show : d.hide;
    }
    function setCollapsed(on){
      document.body.classList.toggle('igdc-collapsed', !!on);
      localize();
    }
    // Hook into existing changeLanguage if present
    (function(){
      var orig = window.changeLanguage;
      if (typeof orig==='function' && !orig.__igdcHooked){
        window.changeLanguage=function(lang){
          try{ orig.apply(this, arguments); }finally{ try{ window.currentLang=lang; }catch(_){ } localize(); }
        };
        window.changeLanguage.__igdcHooked=true;
      }
    })();

    // ---- postMessage listener from child pages ----
    window.addEventListener('message', function(ev){
      try{
        var d = ev.data||{};
        if (!d || !d.IGDC_SCROLL) return;
        if (d.top===true){ setCollapsed(false); }
        else { setCollapsed(true); }
      }catch(_){}
    });

    function init(){
      setHeaderVar();
      ensureBtn();
      localize();
      // Auto set to expanded on load
      setCollapsed(false);
    }
    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('load', function(){ setHeaderVar(); localize(); });

    // Update height var on resize
    window.addEventListener('resize', setHeaderVar);
    // React when <html lang> changes
    try{
      new MutationObserver(function(muts){
        for(var m of muts){ if(m.type==='attributes' && m.attributeName==='lang'){ localize(); break; } }
      }).observe(document.documentElement, { attributes:true, attributeFilter:['lang'] });
    }catch(_){}
  }catch(e){ console.warn('IGDC postMessage receiver init error', e); }
})();
</script>

(function(){
  if (matchMedia('(pointer:coarse)').matches) return;
  let c=false,t=false;const A=160,B=20;
  function on(){const y=window.scrollY||document.documentElement.scrollTop;
    if(!t){requestAnimationFrame(function(){
      if(!c&&y>A){document.body.classList.add('igdc-collapsed');c=true;}

      t=false;
    });t=true;}

<script id="igdc-scroll-shim-js">
(function(){
  'use strict';
  var w = window, d = document;

  // Helpers
  function nav(){ return d.querySelector('nav'); }
  function header(){ return d.querySelector('header'); }
  function collapse(){ d.body.classList.add('igdc-fixed-collapsed'); setHeadVar(0); }
  function expand(){ d.body.classList.remove('igdc-fixed-collapsed'); setTimeout(syncVars, 10); }
  function px(n){ return (Math.max(0, Math.round(n||0)) + 'px'); }

  function navHeight(){
    var n = nav(); if (!n) return 48;
    var r = n.getBoundingClientRect();
    return Math.max(32, Math.round(r.height || 48));
  }
  function headHeight(){
    var h = header(); if (!h) return 0;
    // When collapsed class exists, treat as 0
    if (d.body.classList.contains('igdc-fixed-collapsed')) return 0;
    var r = h.getBoundingClientRect();
    return Math.max(0, Math.round(r.height || 0));
  }
  function setNavVar(val){ d.documentElement.style.setProperty('--igdc-nav-h', px(val)); }
  function setHeadVar(val){ d.documentElement.style.setProperty('--igdc-head-h', px(val)); }
  function syncVars(){
    setNavVar(navHeight());
    setHeadVar(headHeight());
  }

  // Initial sync + on resize
  syncVars();
  w.addEventListener('resize', function(){ syncVars(); }, { passive:true });

  // 1) Header behavior: collapse on first scroll; restore on overscroll release OR existing toggle button
  try{
    var firstCollapsed = false;
    function collapseOnce(){ if (firstCollapsed) return; firstCollapsed = true; collapse(); }
    w.addEventListener('scroll', collapseOnce, { passive:true, once:true });

    // Touch overscroll (release to restore)
    (function(){
      var startY = 0, maxPull = 0, active = false;
      var THRESH = 44;
      d.addEventListener('touchstart', function(ev){
        var t = ev.touches && ev.touches[0]; if (!t) return;
        startY = t.clientY; maxPull = 0; active = true;
      }, { passive:true });
      d.addEventListener('touchmove', function(ev){
        if (!active) return;
        var t = ev.touches && ev.touches[0]; if (!t) return;
        var dy = t.clientY - startY;
        if (dy > maxPull) maxPull = dy;
      }, { passive:true });
      d.addEventListener('touchend', function(){
        var isMobile = (w.matchMedia && w.matchMedia('(max-width: 1024px)').matches);
        if (maxPull >= 44){
          if (isMobile){
            // Mobile: fully expand header/index on pull-down, no auto-collapse re-toggle
            d.body.classList.remove('igdc-fixed-collapsed');
            d.body.classList.remove('igdc-collapsed');
            setTimeout(syncVars, 10);
            firstCollapsed = false;
          } else {
            // Desktop / non-mobile: keep existing toggle behavior
            expand();
            firstCollapsed = false;
            w.addEventListener('scroll', collapseOnce, { passive:true, once:true });
          }
        }
        active = false; maxPull = 0;
      }, { passive:true });
    })();

    // Wheel/trackpad overscroll: restore on intent after quiet
    (function(){
      var acc = 0, timer = 0;
      var THRESH_WHEEL = -120, QUIET_MS = 140;
      d.addEventListener('wheel', function(ev){
        if (ev.deltaY < 0){ acc += ev.deltaY; } else { acc = 0; }
        clearTimeout(timer);
        timer = setTimeout(function(){
          if (acc <= THRESH_WHEEL){
            expand();
            firstCollapsed = false;
            w.addEventListener('scroll', collapseOnce, { passive:true, once:true });
          }
          acc = 0;
        }, QUIET_MS);
      }, { passive:true });
    })();

    // Manual toggle by EXISTING button only (no auto injection)
    d.addEventListener('click', function(ev){
      var el = ev.target && ev.target.closest('[data-role="header-toggle"]');
      if (!el) return;
      ev.preventDefault();
      if (d.body.classList.contains('igdc-fixed-collapsed')){
        expand(); firstCollapsed = false;
        w.addEventListener('scroll', collapseOnce, { passive:true, once:true });
      }else{
        collapse(); firstCollapsed = true;
      }
      // After transition, resync sizes (push/pull)
      setTimeout(syncVars, 260);
    }, { passive: true });
  }catch(e){}

  // 2) NAV scroll buttons (opt-in)
  try{
    var n = nav();
    if (n){
      var prev = n.querySelector('[data-nav-scroll="prev"]');
      var next = n.querySelector('[data-nav-scroll="next"]');
      function scrollByStep(dir){
        var track = n;
        var step = Math.max(120, Math.round(track.clientWidth * 0.5));
        track.scrollBy({ left: dir * step, behavior: 'smooth' });
      }
      if (prev){ prev.addEventListener('click', function(e){ e.preventDefault(); scrollByStep(-1); }, { passive:false }); }
      if (next){ next.addEventListener('click', function(e){ e.preventDefault(); scrollByStep(+1); }, { passive:false }); }
    }
  }catch(e){}

  // 3) Child scroll target
  try{
    var frame = d.getElementById('mainFrame') || d.querySelector('iframe');
    if (frame){
      frame.setAttribute('scrolling', 'auto');
      frame.addEventListener('load', function(){
        setTimeout(syncVars, 50);
        setTimeout(syncVars, 300);
      }, { once:false });
    }
  }catch(e){}
})();
</script>

<script id="igdc-admin-bridge">
(function(){
  // 1) id_token에서 역할 뽑기
  function lower(x){ return String(x||'').trim().toLowerCase(); }
  function getRolesFromIdToken(){
    try{
      var p = window.osAuth && window.osAuth.getIdTokenPayload && window.osAuth.getIdTokenPayload();
      if(!p) return [];
      var raw = p["https://roles"] || p["https://app/roles"] || p.roles || p.role || "";
      if (Array.isArray(raw)) return raw.map(lower);
      return String(raw).split(",").map(lower).filter(Boolean);
    }catch(_){ return []; }
  }

  // 2) 현재 역할 계산
  function currentRole(){
    var roles = getRolesFromIdToken();
    if (roles.includes("admin")) return "admin";
    return roles[0] || "guest";
  }

  // 3) 관리자 UI 열기 + 가드 호환 세팅(osAuth → osauth, __IGDC_ROLE)
  function applyRole(){
    var role = currentRole();

    // 가드/라우터가 기대하는 전역 키들 채워주기
    try{
      window.__IGDC_ROLE = role;
      try{ localStorage.setItem("igdc_role", role); }catch(e){}
      window.osauth = window.osauth || {};
      window.osauth.role = role;
      window.osauth.userRole = role;
      // 가능하면 idTokenClaims도 연결(가드가 참조)
      if (window.osAuth && window.osAuth.getIdTokenPayload){
        window.osauth.idTokenClaims = window.osAuth.getIdTokenPayload() || null;
        window.osauth.user = Object.assign({}, window.osauth.user||{}, { role: role });
        window.osauth.claims = Object.assign({}, window.osauth.claims||{}, { roles: getRolesFromIdToken() });
      }
    }catch(_){}

    // 관리자면 숨김 CSS 제거 + data-role="admin" 노출
    if (role === "admin"){
      try{
        var hide = document.getElementById("igdc-admin-hide");
        if (hide && hide.parentNode) hide.parentNode.removeChild(hide);
      }catch(_){}
      try{
        document.querySelectorAll('[data-role="admin"]').forEach(function(el){ el.style.display = ""; });
      }catch(_){}
    }
  }

  // 최초/로그인 후 모두 적용
  document.addEventListener("DOMContentLoaded", applyRole);
  document.addEventListener("osauth:ready", applyRole);
})();

<!-- Robust language persistence handler (injected) -->
<script>
(function(){
  'use strict';
  function normLang(l){
    if(!l) return null;
    var s = String(l).trim().toLowerCase();
    var map = {'kr':'ko','ko-kr':'ko','ko_kr':'ko','korean':'ko','jp':'ja','ja-jp':'ja',
               'zh-cn':'zh','zh_cn':'zh','zh-hans':'zh','zh-tw':'zh','zh-hant':'zh',
               'en-us':'en','en-gb':'en'};
    if(map[s]) s = map[s];
    if(s.indexOf('-')!==-1) s = s.split(/[-_]/)[0];
    return s;
  }

  function getQueryLang(){
    try{ var p = new URLSearchParams(location.search); return p.get('lang'); }catch(e){return null;}
  }
  function readStored(){
    try{ return localStorage.getItem('igdc_lang'); }catch(e){return null;}
  }
  function writeStored(v){
    try{ localStorage.setItem('igdc_lang', v); }catch(e){}
  }
  function applyHtmlLang(v){
    try{ if(v) document.documentElement.setAttribute('lang', v); }
    catch(e){}
  }

  // Determine language but DO NOT force a default if none present.
  (function init(){
    var q = normLang(getQueryLang());
    if(q){
      writeStored(q);
      applyHtmlLang(q);
      // do not redirect; just set
      return;
    }
    var s = normLang(readStored());
    if(s){
      applyHtmlLang(s);
      return;
    }
    // if document already has lang attribute, normalize it but do not override
    var docl = normLang(document.documentElement.getAttribute('lang'));
    if(docl){
      applyHtmlLang(docl);
      return;
    }
    // else: leave document.lang untouched (no forced default)
  })();

  // Attach handler to common select / UI controls to persist language
  function attachHandlers(){
    var selectors = [
      '#lang-select',
      'select[name="lang-select"]',
      'select.lang-select',
      '[data-lang-control]'
    ];
    selectors.forEach(function(sel){
      try{
        var el = document.querySelector(sel);
        if(el) bind(el);
      }catch(e){}
    });
    // also bind any anchor links with data-lang attribute
    document.querySelectorAll('a[data-lang]').forEach(function(a){
      a.addEventListener('click', function(ev){
        try{
          var v = a.getAttribute('data-lang');
          if(!v) return;
          v = normLang(v);
          if(!v) return;
          writeStored(v);
          applyHtmlLang(v);
        }catch(e){}
      }, {passive:true});
    });
    // generic bind for future dynamically created controls (event delegation)
    document.addEventListener('change', function(ev){
      var t = ev.target;
      if(!t) return;
      if(t.matches && (t.matches('select') || t.matches('[data-lang-control]'))) {
        try{
          var val = t.value || t.getAttribute('data-lang');
          val = normLang(val);
          if(!val) return;
          writeStored(val); applyHtmlLang(val);
          if(typeof window.setLanguage === 'function'){
            try{ window.setLanguage(val); }catch(e){} 
          }
        }catch(e){}
      }
    }, {capture:false, passive:true});
  }

  function bind(el){
    if(!el) return;
    // for select elements
    if(el.tagName && el.tagName.toLowerCase()==='select'){
      el.addEventListener('change', function(e){
        var v = e.target.value;
        v = normLang(v);
        if(!v) return;
        writeStored(v); applyHtmlLang(v);
        if(typeof window.setLanguage === 'function'){
          try{ window.setLanguage(v); }catch(e){}
        }
      }, {passive:true});
    } else {
      // for generic controls with data-lang attribute
      el.addEventListener('click', function(e){
        try{
          var v = el.getAttribute('data-lang') || el.value;
          v = normLang(v);
          if(!v) return;
          writeStored(v); applyHtmlLang(v);
          if(typeof window.setLanguage === 'function'){
            try{ window.setLanguage(v); }catch(e){}
          }
        }catch(e){}
      }, {passive:true});
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', attachHandlers);
  } else {
    attachHandlers();
  }
})();</script>

<script id="active-by-root-slim">
(function(){
  function toRootName(name){
    try{
      name = (name||"").toString().trim();
      name = name.replace(/[?#].*$/,"");           // strip query/hash
      name = name.split("/").pop();                // filename only
      name = name.replace(/\.(html?|php)$/i,"");   // ignore extension
      name = name.replace(/_[A-Za-z0-9\-]+$/,"");  // strip last underscore tail
      return name.toLowerCase();
    }catch(e){ return ""; }
  }
  function getLang(){
    try{
      return (window.currentLang || (navigator.language||"en").slice(0,2) || "en").toLowerCase();
    }catch(e){ return "en"; }
  }
  function getMap(){
    try{
      var lang = getLang();
      if (window.pageMap && Array.isArray(window.pageMap[lang])) return window.pageMap[lang];
      if (window.pageMap && Array.isArray(window.pageMap["en"])) return window.pageMap["en"];
      return [];
    }catch(e){ return []; }
  }
  function resolveFromIframe(){
    var f = document.getElementById("mainFrame");
    if (!f) return "";
    // prefer live location if same-origin, else fallback to src attribute
    try{
      if (f.contentWindow && f.contentWindow.location && f.contentWindow.location.href){
        return f.contentWindow.location.href;
      }
    }catch(e){/* cross-origin, ignore */}
    return f.getAttribute("src") || "";
  }
  function findIndexByRoot(root){
    var map = getMap();
    if (!root) return -1;
    for (var i=0;i<map.length;i++){
      if (toRootName(map[i]) === root) return i;
    }
    return -1;
  }
  function setActiveIndex(idx){
    try{
      document.querySelectorAll("nav a.active").forEach(function(a){ a.classList.remove("active"); });
      if (idx < 0) return;
      var a = document.querySelector('nav a[onclick="loadPage('+idx+')"]');
      if (!a){
        var list = document.querySelectorAll("nav a");
        if (list && list[idx]) a = list[idx];
      }
      if (a) a.classList.add("active");
    }catch(e){}
  }
  function syncActive(){
    var href = resolveFromIframe();
    var root = toRootName(href);
    var idx  = findIndexByRoot(root);
    setActiveIndex(idx);
  }
  document.addEventListener("DOMContentLoaded", function(){
    var f = document.getElementById("mainFrame");
    if (f) f.addEventListener("load", function(){ setTimeout(syncActive, 20); }, true);
    try{
      if (typeof window.loadPage === "function"){
        var _orig = window.loadPage;
        window.loadPage = function(i){ try{ _orig(i); } finally { setTimeout(syncActive, 20); } };
      }
    }catch(e){}
    syncActive();
  });
})();
</script>

<script id="nav-1to1-href-first">
(function(){
  if (window.__NAV_HREF_FIRST__) return; window.__NAV_HREF_FIRST__=true;

  function $(sel, root=document){ return root.querySelector(sel); }
  function $$(sel, root=document){ return Array.from(root.querySelectorAll(sel)); }

  const frame = $('#mainFrame') || $('iframe#mainFrame, iframe[name="mainFrame"]');
  if (!frame) return;

  function setActiveByKey(key){
    ['nav a','.sidebar a','.menu a'].forEach(sel=>{
      $$(sel).forEach(a=>{
        const k=(a.getAttribute('data-nav')||'').toLowerCase();
        if(k===key){ a.classList.add('active'); a.setAttribute('aria-current','page'); }
        else{ a.classList.remove('active'); a.removeAttribute('aria-current'); }
      });
    });
  }

  function goByAnchor(a){
    const url = a.getAttribute('href');
    const key = (a.getAttribute('data-nav')||'').toLowerCase();
    if(!url || !key) return;
    const f = $('#mainFrame') || $('iframe#mainFrame, iframe[name="mainFrame"]');
    if(f) f.src = url;
    setActiveByKey(key);
  }

  // Capture clicks on any anchor that has data-nav
  document.addEventListener('click', function(ev){
    const a = ev.target && ev.target.closest && ev.target.closest('a[data-nav]');
    if(!a) return;
    ev.preventDefault();
    ev.stopPropagation();
    goByAnchor(a);
  }, true);

  // Sync active from frame URL by finding the first anchor whose href matches it
  function syncFromFrame(){
    let href='';
    try{ href = (frame.contentWindow && frame.contentWindow.location && frame.contentWindow.location.href || '').toLowerCase(); }catch(e){}
    if(!href) return;
    const anchors = Array.from(document.querySelectorAll('a[data-nav][href]'));
    for(const a of anchors){
      const u=(a.getAttribute('href')||'').toLowerCase();
      if(u && href.indexOf(u)!==-1){
        const key=(a.getAttribute('data-nav')||'').toLowerCase();
        if(key){ setActiveByKey(key); }
        break;
      }
    }
  }

  frame.addEventListener('load', function(){ setTimeout(syncFromFrame, 50); });
  setTimeout(syncFromFrame, 80);
})();
</script>


<!-- checkout-dispatch-v1 (minimal, conflict-free) -->
<script id="checkout-dispatch-v1">
(function(){
  function isObj(x){return x && typeof x==='object' && !Array.isArray(x);} 
  async function send(body){
    try{
      const r = await fetch('/.netlify/functions/checkout', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      return await r.json();
    }catch(e){ return { ok:false, code:'NETWORK', error:String(e) }; }
  }
  window.addEventListener('message', async (e)=>{
    const m = e && e.data || {}; if(m.type !== 'CHECKOUT') return;
    const body = {
      method: m.method,
      amount: m.amount,
      currency: m.currency,
      meta: isObj(m.meta)? m.meta : {},
      token: m.token || null
    };
    const res = await send(body);
    if (res && res.redirectUrl){ location.href = res.redirectUrl; return; }
    if (res && (res.qr || res.crypto)){
      var id='checkout-crypto-v1';
      var box=document.getElementById(id);
      if(!box){
        box=document.createElement('div'); box.id=id; box.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center';
        box.innerHTML='<div style="background:#fff;max-width:560px;width:92%;padding:20px;border-radius:12px"><h3 style="margin:0 0 8px">Crypto Checkout</h3><div class="cc-body" style="white-space:pre-wrap;font-size:12px"></div><button id="cc-close" style="margin-top:12px">Close</button></div>';
        document.body.appendChild(box);
        box.querySelector('#cc-close').onclick=function(){ box.remove(); };
      }
      box.querySelector('.cc-body').textContent = JSON.stringify(res, null, 2);
      return;
    }
    if (res && res.ok === false){
      alert('Checkout error: ' + (res.code || 'UNKNOWN'));
    }
  });
})();
</script>
<script>
// IGDC: sync iframe height with child pages (mobile/desktop)
(function(){
  function handleFrameHeight(event){
    try{
      var data = event.data;
      if(typeof data === "string"){
        try { data = JSON.parse(data); } catch(e){ return; }
      }
      if(!data || data.type !== "igdcFrameHeight"){ return; }
      var h = parseInt(data.height, 10);
      if(!h || h < 100){ return; }
      var frame = document.getElementById("mainFrame");
      if(!frame){ return; }
      // 최소 100vh 이상으로, 콘텐츠 높이에 맞춰 조정
      var newHeight = h + 32;
      frame.style.height = newHeight + "px";
    }catch(e){}
  }
  if(window.addEventListener){
    window.addEventListener("message", handleFrameHeight, false);
  }
})();
</script>
