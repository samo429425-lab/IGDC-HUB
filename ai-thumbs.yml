name: AI Thumbnails Refresh

on:
  workflow_dispatch:       # 수동 실행 가능
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다 자동 실행

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios fs

      - name: Run AI refresh script
        run: node scripts/ai_refresh.js

      - name: Commit & Push updated thumbnails
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/thumbnails.json
          git commit -m "AI refresh thumbnails [skip ci]" || echo "No changes"
          git push

      - name: Trigger Netlify build hook
        run: |
          curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}
