<script id="rscroll-bind-from-socialnet">
(function(){
  function stepFor(scroller){
    const vw = Math.max(scroller.clientWidth * 0.9, 1);
    const card = scroller.querySelector('.thumb-card');
    const cw = card ? (card.clientWidth + 12) : 200; // 12 = gap
    return Math.max(vw, cw);
  }
  function update(wrap){
    var scroller = wrap.querySelector('.thumb-scroller');
    var left = wrap.querySelector('.rscroll.left');
    var right= wrap.querySelector('.rscroll.right');
    if(!scroller||!left||!right) return;
    var max = scroller.scrollWidth - scroller.clientWidth - 1;
    left.classList.toggle('disabled', scroller.scrollLeft <= 0);
    right.classList.toggle('disabled', scroller.scrollLeft >= max);
  }
  function bind(wrap){
    var scroller = wrap.querySelector('.thumb-scroller');
    var left = wrap.querySelector('.rscroll.left');
    var right= wrap.querySelector('.rscroll.right');
    if(!scroller||!left||!right) return;
    var step = ()=> stepFor(scroller);
    left.addEventListener('click', function(){ scroller.scrollBy({left: -step(), behavior:'smooth'}); });
    right.addEventListener('click', function(){ scroller.scrollBy({left:  step(), behavior:'smooth'}); });
    scroller.addEventListener('scroll', function(){ update(wrap); }, {passive:true});
    window.addEventListener('resize', function(){ update(wrap); }, {passive:true});
    // initial
    setTimeout(function(){ update(wrap); }, 0);
    // 🔧 FIX: 카드가 나중에 들어오면 update 재호출
    try{
    const mo = new MutationObserver(function(){
    update(wrap);
  });
  mo.observe(scroller, { childList:true, subtree:true });
}catch(_){}

  }
  function init(){
    document.querySelectorAll('.scroller-wrap').forEach(bind);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>

<script id="adpanel-drag-scroll">
(function(){
  var panel = document.querySelector('.ad-panel');
  if(!panel) return;
  var target = panel.querySelector('.ad-scroll') || panel;

  var isDown = false, startY = 0, startTop = 0;
  function onDown(e){
    isDown = true;
    startY = e.clientY;
    startTop = target.scrollTop;
    (panel || target).style.cursor = 'grabbing';
    e.preventDefault();
  }
  function onMove(e){
    if(!isDown) return;
    var dy = e.clientY - startY;
    target.scrollTop = startTop - dy;
  }
  function onUp(){
    if(!isDown) return;
    isDown = false;
    (panel || target).style.cursor = '';
  }

  target.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  // Touch support
  var tStartY = 0, tStartTop = 0;
  target.addEventListener('touchstart', function(e){
    var t = e.touches[0];
    tStartY = t.clientY;
    tStartTop = target.scrollTop;
  }, {passive:true});
  target.addEventListener('touchmove', function(e){
    var t = e.touches[0];
    target.scrollTop = tStartTop - (t.clientY - tStartY);
  }, {passive:true});
})();</script>
<script id="thumb-autofill-js">
  (function(){
    function createCard(item) {
      var card = document.createElement("div");
      card.className = "thumb-card";
      var img = document.createElement("div");
      img.className = "thumb-img";
      if (item && item.image) {
        img.style.backgroundImage = "url('" + item.image.replace(/'/g, "%27") + "')";
        img.style.backgroundSize = "cover";
        img.style.backgroundPosition = "center";
      }
      var title = document.createElement("div");
      title.className = "thumb-title";
      title.textContent = (item && item.title) ? item.title : "Polecane";
      var meta = document.createElement("div");
      meta.className = "thumb-meta";
      meta.textContent = (item && item.meta) ? item.meta : "Uzupełniono automatycznie";
      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(meta);
      if (item && item.href) {
        card.addEventListener("click", function(){ location.href = item.href; });
        card.style.cursor = "pointer";
      }
      return card;
    }

    async function backfillList(list){
      var TARGET = 20;
      var cards = list.querySelectorAll(".thumb-card");
      if (cards.length >= TARGET) return;

      var need = TARGET - cards.length;
      var section = list.getAttribute("data-source") || "general";
      var filled = 0;

      try {
        var url = "/api/recommend?section=" + encodeURIComponent(section) + "&need=" + need;
        var r = await fetch(url, { credentials: "include" });
        if (r.ok) {
          var data = await r.json();
          if (Array.isArray(data)) {
            data.slice(0, need).forEach(function(item){
              list.appendChild(createCard(item));
              filled++;
            });
          }
        }
      } catch (e) {}

      while (filled < need) {
        list.appendChild(createCard(null));
        filled++;
      }
    }

    function run(){
      document.querySelectorAll(".thumb-list.thumb-scroller").forEach(backfillList);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", run);
    } else {
      run();
    }
    setTimeout(run, 1500);
  })();
</script>

(function(){
  try{
    function notify(top){
      parent.postMessage({ IGDC_SCROLL:true, top: !!top }, '*');
    }
    function atTop(){
      var se=document.scrollingElement||document.documentElement||document.body;
      return (window.scrollY||window.pageYOffset||0)<=0 && (se?(se.scrollTop||0)<=0:true);
    }
    function onAnyScroll(){ notify(atTop()); }
    window.addEventListener('scroll', onAnyScroll, {passive:true});
    document.addEventListener('scroll', onAnyScroll, {passive:true, capture:true});
    document.addEventListener('wheel', e=>{ if((e.deltaY||0)>0) notify(false); }, {passive:true,capture:true});
    document.addEventListener('touchmove', ()=>notify(false), {passive:true,capture:true});
    setTimeout(()=>notify(atTop()),50);
  }catch(_){}
})();
</script>
<script id="igdc-adpanel-12p-js">
(function(){
  function setup(){
    var panel = document.querySelector('.ad-panel');
    if(!panel) return;
    // make scroll container if missing
    var scroll = panel.querySelector('.ad-scroll');
    if(!scroll){
      scroll = document.createElement('div');
      scroll.className = 'ad-scroll';
      var items = Array.from(panel.querySelectorAll('.ad-box'));
      // move boxes after title
      var title = panel.querySelector('.ad-title');
      if(title){
        items.forEach(function(b){ scroll.appendChild(b); });
        title.insertAdjacentElement('afterend', scroll);
      }else{
        items.forEach(function(b){ scroll.appendChild(b); });
        panel.appendChild(scroll);
      }
    }
    var first = scroll.querySelector('.ad-box');
    var second = first && first.nextElementSibling;
    if(!first){ return; }

    var rect1 = first.getBoundingClientRect();
    var h = rect1.height || 150;
    var gap = 7;
    if(second){
      var rect2 = second.getBoundingClientRect();
      var d = Math.round(rect2.top - rect1.bottom);
      if(!isNaN(d) && Math.abs(d) < 40) gap = Math.max(0, d);
    }
    var target = Math.round((12 * h) + (11 * gap) + 0.35 * (h + gap));
    scroll.style.height = target + 'px';
    scroll.style.maxHeight = target + 'px';
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setup, {once:true});
  else setup();
  window.addEventListener('load', setup);
  window.addEventListener('resize', setup);
})();</script><script id="igdc-scroller-outside-v1">
// IGDC Placement V5 (offset tuned):
// - Left button: midpoint between sidebar.right and content-box.left, then +4px toward box
// - Right button: content-box right inner wall, 10px inset
(function(){
  if (window.__IGDC_OUTSIDE_V5__) return; window.__IGDC_OUTSIDE_V5__=true;

  var sidebar = document.querySelector('.sidebar');

  function size(el){
    var cs = getComputedStyle(el);
    var w = parseFloat(cs.width) || el.getBoundingClientRect().width || 40;
    var h = parseFloat(cs.height) || el.getBoundingClientRect().height || 40;
    return {w:w, h:h};
  }

  function placeOne(wrap){
    var scroller = wrap.querySelector('.thumb-scroller');
    var leftBtn  = wrap.querySelector('.rscroll.left');
    var rightBtn = wrap.querySelector('.rscroll.right');
    if(!scroller || (!leftBtn && !rightBtn)) return;

    var box = wrap.closest('.content-box') || wrap;
    var brect = box.getBoundingClientRect();
    var srect = sidebar ? sidebar.getBoundingClientRect() : { right: 0 };

    // Midpoint for left, then nudge +4px toward content box
    var leftMid  = Math.round((srect.right + brect.left) / 2) + 4;

    // Right inner placement: 4px inset from right wall
    var rightInner = Math.round(brect.right) - 4;

    var wrect = wrap.getBoundingClientRect();
    var cy = Math.round(wrect.top + (wrect.height/2));

    if (leftBtn){
      var L = size(leftBtn);
      leftBtn.style.position = 'fixed';
      leftBtn.style.left = (leftMid - Math.round(L.w/2)) + 'px';
      leftBtn.style.top  = (cy - Math.round(L.h/2)) + 'px';
      leftBtn.style.zIndex = '5000'; leftBtn.style.visibility = 'visible';
    }
    if (rightBtn){
      var R = size(rightBtn);
      rightBtn.style.position = 'fixed';
      rightBtn.style.left = (rightInner - R.w) + 'px';
      rightBtn.style.top  = (cy - Math.round(R.h/2)) + 'px';
      rightBtn.style.zIndex = '5000'; rightBtn.style.visibility = 'visible';
    }
  }

  function placeAll(){ document.querySelectorAll('.scroller-wrap').forEach(placeOne); }

  var raf=0; function schedule(){ cancelAnimationFrame(raf); raf=requestAnimationFrame(function(){ setTimeout(placeAll,20); }); }

  if (document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', schedule, { once:true }); } else { schedule(); }
  window.addEventListener('resize', schedule, { passive:true });
  window.addEventListener('scroll', schedule, { passive:true });
  try{ var ro=new ResizeObserver(schedule); ['.sidebar','.ad-panel','.main-content','.content-box'].forEach(function(sel){ var el=document.querySelector(sel); if(el) ro.observe(el); }); }catch(_){}
})();
</script>

<script id="sidebar-active-script">
(function(){
  function norm(u){
    u = (u||"").toString().trim().toLowerCase();
    u = u.split("#")[0].split("?")[0];
    var f = u.split("/").pop();
    if(f === "" || f === "index.html") f = "home.html";
    f = f.replace(/_ko\.html$|_en\.html$|_zh\.html$/,".html");
    return f;
  }
  function apply(root){
    var current = norm(location.pathname);
    var links = root.querySelectorAll(".sidebar a[href], nav a[href]");
    links.forEach(function(a){
      var href = norm(a.getAttribute("href")||"");
      var on = href && href === current;
      a.classList.toggle("active", !!on);
      if(on){ a.setAttribute("aria-current","page"); }
      else  { a.removeAttribute("aria-current"); }
    });
  }
  function run(){
    // current document
    apply(document);
    // also inside same-origin iframes (e.g., admin srcdoc)
    document.querySelectorAll("iframe").forEach(function(fr){
      try{
        var doc = fr.contentDocument || (fr.contentWindow && fr.contentWindow.document);
        if(doc) apply(doc);
      }catch(e){ /* cross-origin or not ready */ }
    });
  }
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run, {once:true});
  } else {
    run();
  }
  window.addEventListener("hashchange", run);
  window.addEventListener("popstate", run);
})();
</script>
<script id="edge-autohide-mobile-js">
(function(){
  if (!matchMedia('(pointer:coarse)').matches) return;
  const q=s=>document.querySelector(s);
  const top=q('nav')||q('.topbar'), left=q('.sidebar'), right=q('.right-panel')||q('.ad-panel');
  if(!q('.edge-top')) document.body.insertAdjacentHTML('beforeend','<div class="edge-top"></div><div class="edge-left"></div><div class="edge-right"></div>');
  if(top) document.body.classList.add('hide-top'); if(left) document.body.classList.add('hide-left'); if(right) document.body.classList.add('hide-right');
  const S=44; let drag=null,sx=0,sy=0,dx=0,dy=0;
  function bind(sel,dir,showCls){
    const edge=q(sel); if(!edge) return;
    const down=e=>{const t=e.touches?e.touches[0]:e; drag=dir; sx=t.clientX; sy=t.clientY; dx=0; dy=0;
      addEventListener('pointermove',move,{passive:true}); addEventListener('touchmove',move,{passive:true});
      addEventListener('pointerup',up); addEventListener('touchend',up);
    };
    const move=e=>{const t=e.touches?e.touches[0]:e; dx=t.clientX-sx; dy=t.clientY-sy;
      if(drag==='top'&&dy>8) document.body.classList.add(showCls);
      if(drag==='left'&&dx>8) document.body.classList.add(showCls);
      if(drag==='right'&&dx<-8) document.body.classList.add(showCls);
    };
    const up=()=>{const pass=(drag==='top'&&dy>S)||(drag==='left'&&dx>S)||(drag==='right'&&dx<-S);
      if(!pass) document.body.classList.remove(showCls);
      drag=null; removeEventListener('pointermove',move); removeEventListener('touchmove',move);
      removeEventListener('pointerup',up); removeEventListener('touchend',up);
    };
    edge.addEventListener('pointerdown',down); edge.addEventListener('touchstart',down,{passive:true});
    document.addEventListener('click',e=>{const p=(dir==='top'?top:dir==='left'?left:right); if(!p) return;
      if(document.body.classList.contains(showCls)&&!p.contains(e.target)) document.body.classList.remove(showCls);
    });
    addEventListener('scroll',()=>{if(document.body.classList.contains(showCls)) document.body.classList.remove(showCls)},{passive:true});
  }
  if(top) bind('.edge-top','top','show-top');
  if(left) bind('.edge-left','left','show-left');
  if(right) bind('.edge-right','right','show-right');
})();
</script>

<script id="igdc-mobile-rightdrawer-swipe">
/* === Right-edge swipe/tap to reveal the ad panel (mobile only) === */
(function(){
  if (window.__IGDC_MOBILE_RIGHTDRAWER__) return; window.__IGDC_MOBILE_RIGHTDRAWER__ = true;
  var mq = window.matchMedia && window.matchMedia("(max-width: 768px)");
  function active(){ return mq && mq.matches; }

  // Create edge sensor if missing
  var edge = document.querySelector('.edge-right');
  if (!edge){
    edge = document.createElement('div');
    edge.className = 'edge-right';
    document.body.appendChild(edge);
  }

  // Tap edge to open
  edge.addEventListener('click', function(){ if(active()){ document.body.classList.add('show-right'); } }, {passive:true});

  // Close when tapping outside panel
  document.addEventListener('click', function(e){
    if(!active()) return;
    var panel = document.querySelector('.ad-panel');
    if (!panel) return;
    if (document.body.classList.contains('show-right')){
      var r = panel.getBoundingClientRect();
      if (e.clientX < r.left) document.body.classList.remove('show-right');
    }
  }, {passive:true});

  // Minimal swipe detection, restricted to 18px from right edge to avoid conflict with scrollers
  var startX=0, startY=0, touching=false;
  var EDGE=18, THRESH=45;
  document.addEventListener('touchstart', function(e){
    if(!active()) return;
    if (!e.touches || !e.touches.length) return;
    var t = e.touches[0];
    // Only start if from right edge
    if ((window.innerWidth - t.clientX) <= EDGE){
      startX = t.clientX; startY = t.clientY; touching = true;
    }
  }, {passive:true});

  document.addEventListener('touchend', function(e){
    if(!active()) return;
    if (!touching) return; touching=false;
    var t = (e.changedTouches && e.changedTouches[0]) || null;
    if (!t) return;
    var dx = t.clientX - startX;
    var dy = t.clientY - startY;
    if (Math.abs(dx) < Math.abs(dy)) return; // ignore vertical swipes
    if (dx < -THRESH){
      // swipe left from right edge => open drawer
      document.body.classList.add('show-right');
    }
  }, {passive:true});

  // Allow closing with a standard back gesture: swipe right starting outside the panel
  document.addEventListener('touchstart', function(e){
    if(!active()) return;
    if (!document.body.classList.contains('show-right')) return;
    var panel = document.querySelector('.ad-panel'); if(!panel) return;
    var r = panel.getBoundingClientRect();
    if (e.touches[0].clientX < r.left){
      startX = e.touches[0].clientX; startY = e.touches[0].clientY; touching = true;
    }
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    if(!active()) return;
    if (!document.body.classList.contains('show-right')) return;
    if (!touching) return; touching=false;
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < Math.abs(dy)) return;
    if (dx > THRESH){ document.body.classList.remove('show-right'); }
  }, {passive:true});
})();
</script>
<script id="igdc-q-ad-swipe">
(function(){
  var panel = document.querySelector('.ad-panel, #ads');
  if(!panel) return;
  var open = false, startX=0, startY=0, tracking=false;
  function setOpen(v){ open = v; document.body.classList.toggle('ads-open', !!v); }
  window.addEventListener('touchstart', function(e){
    if(open) return;
    var t=e.touches[0]; startX=t.clientX; startY=t.clientY; tracking=false;
    if(window.innerWidth - startX <= 24){ tracking = true; }
  }, {passive:true});
  window.addEventListener('touchmove', function(e){
    if(!tracking) return; var t=e.touches[0];
    var dx = startX - t.clientX, dy = Math.abs(t.clientY - startY);
    if(dy > 40){ tracking=false; return; }
    if(dx > 24){ setOpen(true); tracking=false; }
  }, {passive:true});
  panel.addEventListener('touchstart', function(e){
    var t=e.touches[0]; startX=t.clientX; startY=t.clientY; tracking=true;
  }, {passive:true});
  panel.addEventListener('touchmove', function(e){
    if(!tracking) return; var t=e.touches[0];
    var dx = t.clientX - startX, dy = Math.abs(t.clientY - startY);
    if(dy > 40){ tracking=false; return; }
    if(dx > 24){ setOpen(false); tracking=false; }
  }, {passive:true});
})();
</script>

<script id="m7-guard-and-title-20251027">
(function(){
  try{
    function isMobile(){ return (window.innerWidth||0) <= 1366; }
    function arm(){
      if(!isMobile()) return;
      var wrap = document.getElementById('mobile-ad-rail-wrap');
      var list = document.getElementById('mobile-ad-rail-list');
      if (wrap){ wrap.style.touchAction='auto'; wrap.style.msTouchAction='auto'; wrap.style.overflowY='auto'; }
      // Shorten long title
      var title = document.querySelector('#mobile-ad-rail-wrap .rail-title, #mobile-ad-rail-wrap h3, #mobile-ad-rail-wrap header h3');
      if (title){
        var t=(title.textContent||'').trim();
        if (t.length>8) title.textContent='💎 Polecane marki 💎';
      }
      // Capture-phase guard to preserve native vertical scroll
      var zone = list || wrap;
      if(!zone) return;
      var sx=0, sy=0, active=false;
      zone.addEventListener('touchstart', function(ev){
        if(!ev.touches||!ev.touches.length) return;
        sx=ev.touches[0].clientX; sy=ev.touches[0].clientY; active=true;
      }, {capture:true, passive:true});
      zone.addEventListener('touchmove', function(ev){
        if(!active||!ev.touches||!ev.touches.length) return;
        var dx=ev.touches[0].clientX - sx, dy=ev.touches[0].clientY - sy;
        if (Math.abs(dy) > Math.abs(dx)+4){
          if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        }
      }, {capture:true, passive:true});
      zone.addEventListener('touchend', function(){ active=false; }, {capture:true, passive:true});
      zone.addEventListener('touchcancel', function(){ active=false; }, {capture:true, passive:true});
    }
    if (document.readyState==='complete'||document.readyState==='interactive') arm();
    else document.addEventListener('DOMContentLoaded', arm);
    window.addEventListener('resize', arm);
    window.addEventListener('orientationchange', arm);
  }catch(e){}
})();
</script>
<script id="igtc-checkout-trigger-v1">
(function(){
  if (window.__IGTC_CHECKOUT_READY__) return;
  window.IGTC = window.IGTC || {};
  function safeJSON(s){ try{ return JSON.parse(s); }catch(_){ return null; } }
  IGTC.checkout = function(opts){
    try{
      // Normalize
      var payload = Object.assign({ method: 'card', amount: 0, currency: 'KRW', meta: {} }, opts||{});
      // 1) CustomEvent for same-page listeners (optional)
      try{ window.dispatchEvent(new CustomEvent('IGTC_CHECKOUT', { detail: payload })); }catch(_){}
      // 2) postMessage for index.html dispatcher (if present)
      try{ window.postMessage({ type: 'CHECKOUT', payload: payload }, '*'); }catch(_){}
      // 3) Fallback: call serverless function directly (no-op if not configured)
      try{
        fetch('/.netlify/functions/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
          .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
          .then(function(res){
            if(res && res.redirectUrl){ window.location.assign(res.redirectUrl); }
            else if(res && res.qr && res.qr.html){
              // Minimal inline QR modal (scoped)
              var wrap = document.getElementById('igtc-qr-modal'); 
              if(!wrap){
                wrap = document.createElement('div');
                wrap.id = 'igtc-qr-modal';
                wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px';
                wrap.innerHTML = '<div style="background:#fff;border-radius:12px;max-width:420px;width:100%;padding:16px;">'
                  + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b>Payment QR</b>'
                  + '<button id="igtc-qr-close" style="border:0;background:#eee;border-radius:8px;padding:6px 10px;cursor:pointer">Zamknij</button></div>'
                  + '<div id="igtc-qr-area"></div></div>';
                document.body.appendChild(wrap);
                var btn = document.getElementById('igtc-qr-close');
                if(btn) btn.addEventListener('click', function(){ wrap.remove(); }, { passive:true });
              }
              var area = document.getElementById('igtc-qr-area'); if(area){ area.innerHTML = res.qr.html; }
            }
          })
          .catch(function(){ /* silent fallback */ });
      }catch(_){}
    }catch(_){}
  };
  // Data-API: any element with [data-checkout] will trigger checkout with attributes
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-checkout]'); if(!el) return;
    var metaAttr = el.getAttribute('data-meta');
    var meta = metaAttr ? (safeJSON(metaAttr) || { note: metaAttr }) : {};
    var amount = parseFloat(el.getAttribute('data-amount')||'0') || 0;
    var currency = el.getAttribute('data-currency') || 'KRW';
    var method = el.getAttribute('data-method') || 'card';
    IGTC.checkout({ method: method, amount: amount, currency: currency, meta: meta });
    e.preventDefault();
  }, { passive:true });
  window.__IGTC_CHECKOUT_READY__ = true;
})();
</script>

<script>
// IGDC: report page height to parent index for iframe resizing
(function(){
  function sendHeight(){
    try{
      if(window.parent === window){ return; }
      var docEl = document.documentElement;
      var body = document.body;
      var h = Math.max(
        docEl ? docEl.scrollHeight : 0,
        body ? body.scrollHeight : 0,
        docEl ? docEl.offsetHeight : 0,
        body ? body.offsetHeight : 0
      );
      if(!h || h < 100){ return; }
      var payload = { type: "igdcFrameHeight", height: h, page: location.pathname };
      if(window.parent && window.parent.postMessage){
        window.parent.postMessage(payload, "*");
      }
    }catch(e){}
  }
  function schedule(){
    sendHeight();
    [200, 800, 1600].forEach(function(ms){
      setTimeout(sendHeight, ms);
    });
  }
  if(document.readyState === "complete" || document.readyState === "interactive"){
    schedule();
  }else{
    document.addEventListener("DOMContentLoaded", schedule);
  }
  window.addEventListener("load", function(){ setTimeout(sendHeight, 400); });
  window.addEventListener("resize", function(){ setTimeout(sendHeight, 250); });
  window.addEventListener("orientationchange", function(){ setTimeout(sendHeight, 500); });
})();
</script>
<script id="igdc-product-review-script">
/*
 IGDC Product Review – Auto Hook Version
 - Distribution page thumbnail click auto-detect
 - Product detail review auto-mount (Coupang-style)
 *
 * Requirement:
 *  - Product thumbnail or detail container must have: data-product-id="..."
 *  - window.__IGDC_ROLE (guest | member | admin ...)
 */

(function (window, document) {
  'use strict';

  const Review = {
    config: {
      apiBase: '/.netlify/functions/reviews',
      rootId: 'product-review-root',
      minChars: 10,
      maxChars: 2000
    },

    state: {
      productId: null,
      role: 'guest',
      mountedFor: null
    },

    init() {
      this.state.role = window.__IGDC_ROLE || 'guest';
      this.bindAutoHook();
    },

    /* 🔑 핵심: 디스트리부션 썸네일 클릭 자동 감지 */
    bindAutoHook() {
      document.addEventListener('click', (e) => {
        const card = e.target.closest('[data-product-id]');
        if (!card) return;

        const productId = card.dataset.productId;
        if (!productId) return;

        // 상세 Product이 열릴 시간을 약간 준 뒤 마운트
        setTimeout(() => {
          this.mount(productId);
        }, 50);
      });
    },

    mount(productId) {
      if (!productId) return;
      if (this.state.mountedFor === productId) return;

      this.state.productId = productId;
      this.state.mountedFor = productId;

      const root = this.ensureRoot();
      root.innerHTML = this.renderShell();

      this.bindForm(root);
      this.loadReviews();
    },

    ensureRoot() {
      let root = document.getElementById(this.config.rootId);
      if (!root) {
        root = document.createElement('div');
        root.id = this.config.rootId;

        // 상세 Product 영역 하단에 삽입
        const detail =
          document.querySelector('.product-detail') ||
          document.querySelector('.product-modal') ||
          document.body;

        detail.appendChild(root);
      }
      return root;
    },

    renderShell() {
      const canWrite = this.state.role !== 'guest';
      return `
        <section class="igdc-review">
          <h3 class="igdc-review-title">Opinie o produkcie</h3>
          <div id="igdc-review-list" class="igdc-review-list">Ładowanie...</div>
          ${canWrite ? this.renderForm() : this.renderLoginHint()}
        </section>
      `;
    },

    renderForm() {
      return `
        <form id="igdc-review-form" class="igdc-review-form">
          <textarea
            placeholder="Podziel się swoim doświadczeniem z produktem"
            minlength="${this.config.minChars}"
            maxlength="${this.config.maxChars}"
            required></textarea>
          <div class="igdc-review-actions">
            <button type="submit">Dodaj opinię</button>
          </div>
        </form>
      `;
    },

    renderLoginHint() {
      return `<div class="igdc-review-login-hint">
        Dodawanie opinii jest dostępne po zalogowaniu.
      </div>`;
    },

    bindForm(root) {
      const form = root.querySelector('#igdc-review-form');
      if (!form) return;

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const textarea = form.querySelector('textarea');
        const content = textarea.value.trim();

        if (content.length < this.config.minChars) {
          alert(`Opinia musi mieć co najmniej ${this.config.minChars} znaków.`);
          return;
        }

        this.submitReview(content)
          .then(() => {
            textarea.value = '';
            this.loadReviews();
          })
          .catch(() => alert('Nie udało się dodać opinii'));
      });
    },

    async loadReviews() {
      const list = document.getElementById('igdc-review-list');
      if (!list) return;

      list.textContent = 'Ładowanie...';

      try {
        const res = await fetch(
          `${this.config.apiBase}?productId=${encodeURIComponent(this.state.productId)}`
        );
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = '<div class="igdc-review-empty">No reviews yet.</div>';
          return;
        }

        list.innerHTML = data.map(this.renderItem).join('');
      } catch {
        list.textContent = 'Failed to load reviews.';
      }
    },

    async submitReview(content) {
      const res = await fetch(this.config.apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          productId: this.state.productId,
          content
        })
      });

      if (!res.ok) throw new Error('submit failed');
    },

    renderItem(item) {
      const esc = (v) => String(v || '').replace(/[<>]/g, '');
      return `
        <div class="igdc-review-item">
          <div class="igdc-review-meta">
            <span>${esc(item.user || 'Anonymous')}</span>
            <span>${esc(item.date || '')}</span>
          </div>
          <div class="igdc-review-content">${esc(item.content)}</div>
        </div>
      `;
    }
  };

  /* 기본 스타일 */
  const style = document.createElement('style');
  style.textContent = `
    .igdc-review { margin-top:24px; border-top:1px solid #eee; padding-top:16px; }
    .igdc-review-title { margin:0 0 12px; font-size:1.05rem; }
    .igdc-review-list { display:flex; flex-direction:column; gap:10px; }
    .igdc-review-item { border:1px solid #eee; border-radius:10px; padding:10px; background:#fafafa; }
    .igdc-review-meta { font-size:.8rem; color:#666; display:flex; gap:8px; }
    .igdc-review-content { margin-top:6px; line-height:1.5; }
    .igdc-review-form textarea { width:100%; min-height:90px; padding:10px; border-radius:10px; border:1px solid #ddd; }
    .igdc-review-actions { margin-top:8px; text-align:right; }
    .igdc-review-actions button { padding:8px 14px; border-radius:10px; border:none; background:#2563eb; color:#fff; }
    .igdc-review-empty, .igdc-review-login-hint { color:#666; }
  `;
  document.head.appendChild(style);

  Review.init();
  window.IGDCProductReview = Review;

})(window, document);
</script>
