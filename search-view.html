<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>IGDC Global Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,body{margin:0;height:100%;background:#0b0f1a}
    .top{
      height:44px; display:flex; align-items:center; gap:10px;
      padding:0 12px; background:#0f172a; color:#e5e7eb; font:14px system-ui
    }
    .top .brand{font-weight:700}
    .frame{width:100%; height:calc(100% - 44px); border:0; background:#fff}
  </style>
</head>
<body>
  <div class="top">
    <span class="brand">IGDC Global Search</span>
    <span id="url"></span>
  </div>
  <iframe id="frame" class="frame"
    sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>

  <script>
    const p = new URLSearchParams(location.search);
    const u = p.get('u');
    if (u){
      const url = decodeURIComponent(u);
      document.getElementById('url').textContent = url;
      document.getElementById('frame').src = url;
    }
  </script>
</body>
</html>
