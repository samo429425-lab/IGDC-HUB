<style>

/* =========================
   BASE
========================= */

body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
}

.container{
  display:flex;
  flex-direction:row;
  align-items:stretch;
}

.sidebar{
  width:210px;
  min-width:clamp(180px,30vw,260px);
  background:#e0e0e0;
  display:flex;
  flex-direction:column;
  padding-top:30px;
  flex:0 0 auto;
}

.sidebar a{
  display:block;
  background:#fff4e0;
  color:#804000;
  text-decoration:none;
  padding:10px 12px;
  font-weight:700;
  border:1px solid #f3d9b0;
  border-radius:8px;
  margin:10px 12px;
}

.sidebar a:hover{
  background:#ffe5b4;
  text-decoration:underline;
}

.main-content{
  flex:1 1 auto;
  min-width:0;
  background:#fff;
  padding:40px 30px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
  text-align:center;
}

footer{
  background:#004080;
  color:#fff;
  text-align:center;
  padding:20px 15px;
  font-size:.9rem;
}


/* =========================
   GLOBAL VARS
========================= */

:root{
  --card-min:200px;
  --card-max:260px;
  --pic-h:84px;
  --gap:12px;
}


/* =========================
   AD PANEL
========================= */

.ad-panel{
  position:sticky !important;
  top:16px !important;
  max-height:calc(100dvh - 32px);
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  cursor:grab;

  scrollbar-width:none;
  -ms-overflow-style:none;
}

.ad-panel.dragging{
  cursor:grabbing;
  user-select:none;
}

.ad-panel::-webkit-scrollbar{
  width:0!important;
  height:0!important;
}

.ad-panel .rscroll{
  display:none!important;
}

.ad-panel .ad-box{
  width:100%!important;
  min-height:144px!important;
  height:144px!important;
  line-height:144px!important;
  border-radius:12px!important;
  box-sizing:border-box;
  display:block!important;
  scroll-snap-align:unset!important;
}


/* =========================
   AD CARD
========================= */

.ad-box{
  background:#fff;
  width:274px;
  max-width:274px;
  height:144px;
  border:1px solid #ccc;
  border-radius:12px;
  text-align:center;
  font-size:.9em;
  color:#444;
  cursor:pointer;
  overflow:hidden;
}

.ad-box a{
  display:block;
  height:100%;
  color:inherit;
  text-decoration:none;
}


/* =========================
   THUMB GRID
========================= */

.thumb-viewport{
  position:relative;
  margin-top:10px;
}

.thumb-scroller{
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-bottom:4px;
}

.thumb-grid{
  display:grid;
  grid-auto-flow:column;
  grid-template-rows:repeat(6,minmax(0,1fr));
  grid-auto-columns:minmax(var(--card-min),var(--card-max));
  gap:var(--gap);
}


/* =========================
   CARD
========================= */

.card{
  border:1px solid #e6e6e6;
  border-radius:10px;
  overflow:hidden;
  background:#fff;
  display:flex;
  flex-direction:column;
  min-width:var(--card-min);
  max-width:var(--card-max);
}

.pic{
  height:var(--pic-h);
  background:linear-gradient(135deg,#e8f1ff,#fdf6e8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

.meta{
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.title{
  font-weight:700;
  font-size:.9rem;
  color:#222;
}

.desc{
  font-size:.8rem;
  color:#555;
  min-height:32px;
}

.cta{
  margin-top:auto;
  text-align:center;
  padding:6px 8px;
  background:#004080;
  color:#fff;
  border-radius:8px;
  font-weight:700;
  text-decoration:none;
}


/* =========================
   ROW SCROLL
========================= */

.rows{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}

.row-viewport{
  position:relative;
}

.row-scroller{
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-bottom:4px;
}

.row-grid{
  display:grid;
  grid-auto-flow:column;
  grid-template-rows:1fr;
  grid-auto-columns:minmax(var(--card-min),var(--card-max));
  gap:var(--gap);
}

.rscroll{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  z-index:999;
  border:none;
  background:rgba(0,0,0,.35);
  color:#fff;
  font-size:24px;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  opacity:0;
  transition:.12s;
}

.rscroll.disabled{
  opacity:.35;
  pointer-events:none;
}


/* =========================
   RESPONSIVE
========================= */

@media (max-width:980px){
  :root{ --pic-h:84px; }
}

@media (max-width:720px){
  :root{ --pic-h:84px; }
}

@media (max-width:900px){

  .container{
    display:block!important;
    width:100%!important;
    overflow-x:hidden!important;
  }

  .sidebar{
    display:none!important;
  }

  .main-content{
    width:100%!important;
    margin:0!important;
    max-width:100%!important;
  }

}

<script id="social-mobile-rail-js">
(function(){

/* ===================================================
   Social Mobile Rail - Production Stable Version
   - Safe against Ctrl+F5
   - Safe against late renderer load
   - No empty-lock
   - No duplication
   =================================================== */

var built = false;
var lastMode = null;
var hookAttached = false;
var observer = null;

/* ---------------------------
   Aspect ratio sync
---------------------------- */
function setAspect(card){
  var media = card.querySelector('img, video');
  if(!media){
    card.style.aspectRatio = "16 / 9";
    return;
  }

  function apply(w,h){
    card.style.aspectRatio = (w>0 && h>0) ? (w + " / " + h) : "16 / 9";
  }

  if(media.tagName === 'IMG'){
    if(media.complete && media.naturalWidth){
      apply(media.naturalWidth, media.naturalHeight);
    }else{
      media.addEventListener('load', function(){
        apply(media.naturalWidth, media.naturalHeight);
      }, { once:true });
    }
  }

  if(media.tagName === 'VIDEO'){
    if(media.readyState >= 1){
      apply(media.videoWidth, media.videoHeight);
    }else{
      media.addEventListener('loadedmetadata', function(){
        apply(media.videoWidth, media.videoHeight);
      }, { once:true });
    }
  }
}

/* ---------------------------
   Build rail safely
---------------------------- */
function build(){

  var rail = document.getElementById('social-mobile-rail');
  var list = rail && rail.querySelector('.list');
  var src  = document.getElementById('rightAutoPanel');

  if(!rail || !list || !src) return;

  var boxes = src.querySelectorAll('.ad-box');

  if(!boxes.length){
    built = false;   // ❗ 절대 잠그지 않음
    return;
  }

  list.innerHTML = "";

  boxes.forEach(function(box){
    var clone = box.cloneNode(true);
    clone.classList.add('card');
    clone.style.height = 'auto';
    clone.style.minHeight = '0';
    clone.style.maxHeight = 'none';
    list.appendChild(clone);
    setAspect(clone);
  });

  built = true;
}

/* ---------------------------
   Mode switch
---------------------------- */
function toggle(){

  var isMobile = window.matchMedia('(max-width:1024px)').matches;
  var rail = document.getElementById('social-mobile-rail');
  if(!rail) return;

  var mode = isMobile ? 'mobile' : 'desktop';
  if(mode === lastMode) return;

  lastMode = mode;

  if(isMobile){
    rail.style.display = 'block';
    built = false;
    build();
  }else{
    rail.style.display = 'none';
    built = false;
    var list = rail.querySelector('.list');
    if(list) list.innerHTML = "";
  }
}

/* ---------------------------
   Hook renderer (safe loop)
---------------------------- */
function attachHook(){

  if(hookAttached) return;

  var fn = window.__IGDC_RIGHTPANEL_RENDER || window.__RIGHT_PANEL_RENDER;

  if(typeof fn !== 'function'){
    setTimeout(attachHook, 150);  // ❗ 렌더러 생길 때까지 재시도
    return;
  }

  function wrapped(items){
    fn(items);
    if(window.matchMedia('(max-width:1024px)').matches){
      built = false;
      build();
    }
  }

  window.__IGDC_RIGHTPANEL_RENDER = wrapped;
  window.__RIGHT_PANEL_RENDER = wrapped;

  hookAttached = true;
}

/* ---------------------------
   Observe right panel changes
---------------------------- */
function observeSource(){

  var src = document.getElementById('rightAutoPanel');
  if(!src) return;

  if(observer) observer.disconnect();

  observer = new MutationObserver(function(){
    if(window.matchMedia('(max-width:1024px)').matches){
      built = false;
      build();
    }
  });

  observer.observe(src, { childList:true, subtree:false });
}

/* ---------------------------
   Init
---------------------------- */
function init(){
  toggle();
  attachHook();
  observeSource();
}

/* DOM Ready */
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init, { once:true });
}else{
  init();
}

/* Debounced resize */
var rsTimer = null;
window.addEventListener('resize', function(){
  clearTimeout(rsTimer);
  rsTimer = setTimeout(toggle, 250);
});

})();
</script>

<script id="igdc-qa-config">
  (function () {
    // 1) 민감 정보 없는 기본 설정
    const baseConfig = {
      url: (window.IGDC_ENV && window.IGDC_ENV.SUPABASE_URL) || "",
      project: "IGDC",
      pageId: null,
      aiEndpoint: null
    };

    // Supabase 환경을 SUPER_VARSAR에 적용하는 함수
    function applyConfig(env) {
      const url =
        (env && env.SUPABASE_URL) ||
        baseConfig.url;

      const anonKey =
        (env && env.SUPABASE_ANON_KEY) ||
        "";

      if (!anonKey) {
        console.warn("[IGDC] Supabase anonKey is not configured.");
      }

      // Q&A 메인 스크립트가 참고하는 전역 설정
      window.SUPER_VARSAR = Object.assign(
        window.SUPER_VARSAR || {},
        baseConfig,
        {
          url: url,
          anonKey: anonKey
        }
      );
    }

    // 2) 이미 전역에 IGDC_ENV가 있으면(로컬 테스트용 등) 우선 사용
    if (window.IGDC_ENV &&
        (window.IGDC_ENV.SUPABASE_ANON_KEY || window.IGDC_ENV.SUPABASE_URL)) {
      applyConfig(window.IGDC_ENV);
      return;
    }

    // 3) 없으면 Netlify Functions에서 환경변수 읽어오기
    //    secureEnvBridge는 Netlify env의 SUPABASE_URL / SUPABASE_ANON_KEY를 JSON으로 반환한다고 가정
    var endpoint = "/.netlify/functions/secureEnvBridge?public=supabase";

    fetch(endpoint, { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) {
          throw new Error("http " + res.status);
        }
        return res.json();
      })
      .then(function (data) {
        // { env: { SUPABASE_URL: "...", SUPABASE_ANON_KEY: "..." } } 또는 평평한 구조 모두 대응
        var env = data && (data.env || data) || {};
        // 한 번 받아온 값은 전역에도 저장 (다른 스크립트에서 재사용 가능)
        window.IGDC_ENV = Object.assign(window.IGDC_ENV || {}, env);
        applyConfig(window.IGDC_ENV);
        console.log("[IGDC] Supabase env loaded from secureEnvBridge.");
      })
      .catch(function (err) {
        console.warn("[IGDC] Failed to load Supabase env:", err && err.message);
        // 실패해도 페이지가 깨지지 않도록 기본값만 적용
        applyConfig(null);
      });
  })();
</script>

(function(){
  function norm(u){
    u = (u||"").toString().trim().toLowerCase();
    u = u.split("#")[0].split("?")[0];
    var f = u.split("/").pop();
    if(f === "" || f === "index.html") f = "home.html";
    f = f.replace(/_ko\.html$|_en\.html$|_zh\.html$/,".html");
    return f;
  }
  function apply(root){
    var current = norm(location.pathname);
    var links = root.querySelectorAll(".sidebar a[href], nav a[href]");
    links.forEach(function(a){
      var href = norm(a.getAttribute("href")||"");
      var on = href && href === current;
      a.classList.toggle("active", !!on);
      if(on){ a.setAttribute("aria-current","page"); }
      else  { a.removeAttribute("aria-current"); }
    });
  }
  function run(){
    // current document
    apply(document);
    // also inside same-origin iframes (e.g., admin srcdoc)
    document.querySelectorAll("iframe").forEach(function(fr){
      try{
        var doc = fr.contentDocument || (fr.contentWindow && fr.contentWindow.document);
        if(doc) apply(doc);
      }catch(e){ /* cross-origin or not ready */ }
    });
  }
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run, {once:true});
  } else {
    run();
  }
  window.addEventListener("hashchange", run);
  window.addEventListener("popstate", run);
})();

function updateRowUI(i){
  const scroller = qs(`#rowScroller${i}`);
  const left = qs(`#rsLeft${i}`);
  const right = qs(`#rsRight${i}`);
  if(!scroller||!left||!right) return;

  const atStart = scroller.scrollLeft <= 2;
  const atEnd = (scroller.scrollLeft + scroller.clientWidth >= scroller.scrollWidth - 2);

(function(){

    rafId = requestAnimationFrame(()=>{
      rafId = null;

        positionAllRightArrows();
        positionAllLeftArrows();

(function init(){

  queueMicrotask(()=>{ updateAllRowUI(); (window.__scheduleArrows||function(){})(); });

    document.querySelectorAll('[data-deferred="1"]').forEach(el=>{
      el.removeAttribute('data-deferred');
      el.style.display='';
    });
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', normalize, {once:true});
  }else{
    normalize();
  }
})();
</script>

<script>
(function(){
  // Configuration (non-temporary, production-safe)
  const FEED_URL = window.INF_LIST_URL || '/api/feed?page=socialnetwork&lang=ko';
  const INITIAL = Number(window.INF_INITIAL_COUNT || 12);
  const BATCH   = Number(window.INF_BATCH_COUNT   || 12);

  const root  = document.getElementById('influencer-sections');
  const tpl   = document.getElementById('inf-card');
  const viewer= document.getElementById('inf-viewer');
  const track = viewer.querySelector('.infv-track');
  const btnPrev = viewer.querySelector('.infv-prev');
  const btnNext = viewer.querySelector('.infv-next');
  const btnClose= viewer.querySelector('.infv-close');

  let flatList = [];   // flattened items for viewer navigation
  let flatIndexMap = new Map(); // key -> flat index
  let currentIndex = 0;

  // Utilities
  const pick = (o, keys) => keys.find(k => {
    // deep path support a.b
    const v = k.split('.').reduce((x,p)=>x && x[p], o);
    return v !== undefined && v !== null && v !== '';
  }) && keys.reduce((acc,k)=>{
    const v = k.split('.').reduce((x,p)=>x && x[p], o);
    if(v!==undefined && v!==null && v!=='') acc = v;
    return acc;
  }, undefined);

  const getName = it => (it.title || it.name || it.displayName || it.handle || it.username || 'Untitled');
  const getImg  = it => (it.img || it.image || it.thumbnail || (it.images && it.images[0]) || null);
  const getUrl  = it => (it.url || it.href || it.link || it.detailUrl || null);
  const getMeta = it => (it.platform || (it.platforms && it.platforms[0]) || it.source || '');

  function isRootUrl(u){
    try {
      const url = new URL(u, location.origin);
      const path = (url.pathname||'').replace(/\\/$/, '');
      return !path || path === '';
    } catch { return false; }
  }

  function sectionEl(title){
    const wrap = document.createElement('section');
    wrap.className = 'inf-section';
    const h = document.createElement('h3');
    h.className = 'inf-title';
    h.textContent = title || '';
    const grid = document.createElement('div');
    grid.className = 'inf-grid';
    wrap.appendChild(h);
    wrap.appendChild(grid);
    return {wrap, grid};
  }

  function makeCard(item, idx){
    const node = tpl.content.cloneNode(true);
    const a = node.querySelector('.inf-thumb');
    const img = node.querySelector('img');
    const n = node.querySelector('.inf-name');
    const m = node.querySelector('.inf-meta');

    const name = getName(item);
    const url  = getUrl(item);
    const src  = getImg(item);
    const meta = getMeta(item);

    if(img && src) { img.src = src; img.alt = name; }
    if(n) n.textContent = name;
    if(m && meta) m.textContent = meta;

    a.href = url || '#';
    a.addEventListener('click', function(ev){
      // Mobile portrait or desktop: open fullscreen viewer for YouTube, else open same tab
      if(!url || isRootUrl(url)) return; // let it be default
      ev.preventDefault();
      if(isYouTube(url)){
        openViewerByIndex(flatIndexMap.get(item.__key));
      } else {
        // Non-YouTube frequently blocks iframe; open directly
        location.href = url;
      }
    });
    return node;
  }

  function isYouTube(u){
    try{
      const x = new URL(u, location.origin);
      return /(^|\\.)youtube\\.com$/.test(x.hostname) || /youtu\\.be$/.test(x.hostname);
    }catch{ return false; }
  }

  function toYouTubeEmbed(u){
    try{
      const url = new URL(u, location.origin);
      if(/youtu\\.be$/.test(url.hostname)){
        const id = url.pathname.slice(1);
        return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      }
      if(url.hostname.endsWith('youtube.com')){
        if(url.pathname === '/watch'){
          const v = url.searchParams.get('v');
          if(v) return `https://www.youtube.com/embed/${v}?autoplay=1&rel=0`;
        }
        if(url.pathname.startsWith('/shorts/')){
          const id = url.pathname.split('/')[2];
          if(id) return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        }
        if(url.pathname.startsWith('/embed/')) return u;
      }
    }catch{}
    return null;
  }

  function openViewerByIndex(i){
    if(i==null || i<0 || i>=flatList.length) return;
    currentIndex = i;
    renderViewer();
    viewer.classList.remove('infv-hidden');
    viewer.setAttribute('aria-hidden','false');
    viewer.focus({preventScroll:true});
  }
  function closeViewer(){
    viewer.classList.add('infv-hidden');
    viewer.setAttribute('aria-hidden','true');
    track.innerHTML = '';
  }
  btnClose.addEventListener('click', closeViewer);
  btnPrev.addEventListener('click', ()=>{ if(currentIndex>0){ currentIndex--; renderViewer(); } });
  btnNext.addEventListener('click', ()=>{ if(currentIndex<flatList.length-1){ currentIndex++; renderViewer(); } });
  document.addEventListener('keydown', (e)=>{
    if(viewer.classList.contains('infv-hidden')) return;
    if(e.key==='Escape') closeViewer();
    if(e.key==='ArrowLeft') btnPrev.click();
    if(e.key==='ArrowRight') btnNext.click();
  });

  function renderViewer(){
    track.innerHTML='';
    const item = flatList[currentIndex];
    const slide = document.createElement('div');
    slide.className = 'infv-item';

    const media = document.createElement('div');
    media.className = 'infv-media';
    const caption = document.createElement('div');
    caption.className = 'infv-caption';
    caption.textContent = getName(item);

    // YouTube embed only; others open directly (safer for X/IG/TikTok/FB)
    const embed = toYouTubeEmbed(getUrl(item));
    if(embed){
      const iframe = document.createElement('iframe');
      iframe.className = 'infv-iframe';
      iframe.src = embed;
      iframe.allow = "autoplay; encrypted-media; picture-in-picture";
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      media.appendChild(iframe);
    }else{
      const poster = document.createElement('img');
      poster.className = 'infv-poster';
      poster.src = getImg(item) || '';
      poster.alt = getName(item);
      media.appendChild(poster);
      media.addEventListener('click', ()=>{
        const u = getUrl(item); if(u) location.href = u;
      });
    }
    slide.appendChild(media);
    slide.appendChild(caption);
    track.appendChild(slide);
  }

  // Fetch & render
  async function init(){
    try{
      const res = await fetch(FEED_URL, {cache:'no-store', credentials:'omit'});
      if(!res.ok) return;
      const data = await res.json();
      const sections = (data.grid && data.grid.sections) ? data.grid.sections : [];
      root.innerHTML='';
      flatList = [];
      flatIndexMap.clear();
      sections.forEach((sec, sidx)=>{
        const {wrap, grid} = sectionEl(sec.title || sec.name || ('섹션 '+(sidx+1)));
        const items = Array.isArray(sec.items) ? sec.items : [];
        // Initial slice only; further batches can be appended by external scroll handler if needed
        const initial = items.slice(0, INITIAL);
        initial.forEach((it)=>{
          const url = getUrl(it);
          if(!url || isRootUrl(url)) return; // skip root/empty
          const key = (it.id || it.handle || it.username || it.url || Math.random().toString(36).slice(2)) + '|' + (sec.id || sidx);
          it.__key = key;
          const idx = flatList.length;
          flatList.push(it);
          flatIndexMap.set(key, idx);
          grid.appendChild(makeCard(it, idx));
        });
        wrap.appendChild(grid);
        root.appendChild(wrap);
      });
    }catch(e){
      // fail silently (no temporary stubs)
      console.warn('[socialnetwork lanes] load failed', e);
    }
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
})();
</script>

<script id="mobile-rightpanel-stable-v1">
/* Stable mobile right panel handler (no clone, no repeat, reversible) */
(function(){

  let moved=false;
  let originalParent=null;
  let originalNext=null;
  let filled=false;

  function isMobile(){
    return matchMedia('(max-width:1023px)').matches;
  }

  function isPortrait(){
    return matchMedia('(max-width:900px) and (orientation:portrait)').matches;
  }

  function getMain(){
    return document.querySelector('.main, .main-content, main, [data-main]');
  }

  function getRight(){
    return document.querySelector('.right-panel, .ad-panel, .right-ad-panel, aside[role="complementary"]');
  }

  function relocate(){

    const main=getMain();
    const right=getRight();

    if(!main||!right) return;

    if(!originalParent){
      originalParent=right.parentNode;
      originalNext=right.nextSibling;
    }

    if(isMobile() && isPortrait()){

      if(!moved){
        main.parentNode.insertBefore(right, main.nextSibling);
        moved=true;
      }

    }else{

      if(moved && originalParent){
        if(originalNext) originalParent.insertBefore(right, originalNext);
        else originalParent.appendChild(right);
        moved=false;
      }
    }
  }

  function fillMobileGrid(){

    if(!isMobile()) return;
    if(filled) return;

    const grid=document.querySelector('#rpMobileGrid');
    if(!grid) return;

    const right=getRight();
    if(!right) return;

    const cards=Array.from(
      right.querySelectorAll('.ad-box,.thumb-card,.card,.thumbnail-card,.sn-card')
    ).slice(0,60);

    if(!cards.length) return;

    grid.innerHTML='';

    cards.forEach(el=>{
      const n=el.cloneNode(true);
      n.removeAttribute('id');
      grid.appendChild(n);
    });

    filled=true;
  }

  function init(){
    relocate();
    fillMobileGrid();

    window.addEventListener('resize', ()=>{
      requestAnimationFrame(relocate);
    });

    window.addEventListener('orientationchange', ()=>{
      setTimeout(relocate,150);
    });
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', init, {once:true});
  }else{
    init();
  }

})();
</script>

<script id="bc-narrow-js">
(function(){
  var tiles = document.querySelectorAll('.section-blockchain .bc-tile');
  tiles.forEach(function(t){
    if (t.querySelector('.bc-narrow')) return;
    // Create wrapper span
    var span = document.createElement('span');
    span.className = 'bc-narrow';
    // Move only text nodes into wrapper; keep icons/imgs as-is
    var nodes = Array.prototype.slice.call(t.childNodes);
    nodes.forEach(function(n){
      if (n.nodeType === Node.TEXT_NODE || (n.nodeType===1 && n.tagName==='SPAN' && n.childNodes.length && Array.prototype.every.call(n.childNodes, function(c){return c.nodeType===Node.TEXT_NODE;}))) {
        span.appendChild(n);
      }
    });
    // Insert wrapper at the beginning if it has content
    if (span.childNodes.length){
      t.insertBefore(span, t.firstChild);
    }
  });
})();</script>

<script id="edge-autohide-mobile-js">
(function(){
  if (!matchMedia('(pointer:coarse)').matches) return;
  const q=s=>document.querySelector(s);
  // broaden header candidates; assign marker class .sn-top to the first existing
  const headerSel = ['nav','.topbar','header','.header','.index','.index-head','[data-role="top"]','.hero-title','.title'];
  let topEl = null;
  for (const s of headerSel){ const el = q(s); if (el){ topEl = el; break; } }
  if (topEl && !topEl.classList.contains('sn-top')) topEl.classList.add('sn-top');

  const left = q('.sidebar');
  const right= q('.right-panel')||q('.ad-panel');

  if(!q('.edge-top'))
    document.body.insertAdjacentHTML('beforeend','<div class="edge-top"></div><div class="edge-left"></div><div class="edge-right"></div>');

  if(topEl) document.body.classList.add('hide-top');
  if(left)  document.body.classList.add('hide-left');
  if(right) document.body.classList.add('hide-right');

  const S=44; let drag=null,sx=0,sy=0,dx=0,dy=0;
  function bind(sel,dir,showCls){
    const edge=q(sel); if(!edge) return;
    const down=e=>{const t=e.touches?e.touches[0]:e; drag=dir; sx=t.clientX; sy=t.clientY; dx=0; dy=0;
      addEventListener('pointermove',move,{passive:true}); addEventListener('touchmove',move,{passive:true});
      addEventListener('pointerup',up); addEventListener('touchend',up);
    };
    const move=e=>{const t=e.touches?e.touches[0]:e; dx=t.clientX-sx; dy=t.clientY-sy;
      if(drag==='top'&&dy>8) document.body.classList.add(showCls);
      if(drag==='left'&&dx>8) document.body.classList.add(showCls);
      if(drag==='right'&&dx<-8) document.body.classList.add(showCls);
    };
    const up=()=>{const pass=(drag==='top'&&dy>S)||(drag==='left'&&dx>S)||(drag==='right'&&dx<-S);
      if(!pass) document.body.classList.remove(showCls);
      drag=null; removeEventListener('pointermove',move); removeEventListener('touchmove',move);
      removeEventListener('pointerup',up); removeEventListener('touchend',up);
    };
    edge.addEventListener('pointerdown',down); edge.addEventListener('touchstart',down,{passive:true});
    document.addEventListener('click',e=>{
      const p=(dir==='top'?topEl:dir==='left'?left:right); if(!p) return;
      if(document.body.classList.contains(showCls)&&!p.contains(e.target)) document.body.classList.remove(showCls);
    });
    addEventListener('scroll',()=>{ if(document.body.classList.contains(showCls)) document.body.classList.remove(showCls) }, {passive:true});
  }
  if(topEl) bind('.edge-top','top','show-top');
  if(left)  bind('.edge-left','left','show-left');
  if(right) bind('.edge-right','right','show-right');
})();
</script>
<script id="igdc-igdcscroll-notify">
(function(){
  try{
    function notify(top){
      parent.postMessage({ IGDC_SCROLL:true, top: !!top }, '*');
    }
    function atTop(){
      var se=document.scrollingElement||document.documentElement||document.body;
      return (window.scrollY||window.pageYOffset||0)<=0 && (se?(se.scrollTop||0)<=0:true);
    }
    function onAnyScroll(){ notify(atTop()); }
    window.addEventListener('scroll', onAnyScroll, {passive:true});
    document.addEventListener('scroll', onAnyScroll, {passive:true, capture:true});
    document.addEventListener('wheel', function(e){ if((e.deltaY||0)>0) notify(false); }, {passive:true,capture:true});
    document.addEventListener('touchmove', function(){ notify(false); }, {passive:true,capture:true});
    setTimeout(function(){ notify(atTop()); }, 50);
  }catch(_){}
})();
</script>

<script id="rpMobileGrid-horizontal-unlock-fix-v4">
(function(){
  var GRID = document.querySelector('#rpMobileGrid');
  var SCROLLER = document.querySelector('#rpMobileScroller') || document.querySelector('#rpMobileBox');
  if(!GRID || !SCROLLER) return;
  var RATIO = 3/5;
  function fixCard(el){
    var media = el.querySelector('.thumb-media, .media, figure, img, video') || el;
    if(!media) return;
    var w = el.clientWidth || GRID.clientWidth || SCROLLER.clientWidth;
    if(!w) return;
    var h = Math.round(w * RATIO);
    if(!/IMG|VIDEO/.test(media.tagName)){
      media.style.height = h + 'px';
      var inner = media.querySelector('img, video');
      if(inner){
        inner.style.width='100%'; inner.style.height='100%'; inner.style.objectFit='cover';
      }
    }else{
      media.style.width='100%'; media.style.height= Math.round(w * RATIO) + 'px'; media.style.objectFit='cover';
    }
  }
  function sweep(){
    var kids = GRID.children;
    for(var i=0;i<kids.length;i++){ fixCard(kids[i]); }
  }
  sweep(); [60,180,360,720].forEach(function(t){ setTimeout(sweep, t); });
  var mo = new MutationObserver(function(muts){
    var added = false;
    for(var i=0;i<muts.length;i++){ if(muts[i].addedNodes && muts[i].addedNodes.length){ added = true; break; } }
    if(added) sweep();
  });
  mo.observe(GRID, {childList:true});
  window.addEventListener('resize', sweep);
  window.addEventListener('orientationchange', sweep);
})();
</script>

<script id="rpMobile-photoview-js-v1">
(function(){
  function getUrlFrom(el){
    var a = el.querySelector('a[href]');
    if (a && a.getAttribute('href')) return a.href || a.getAttribute('href');
    var cand = el.getAttribute('data-url') || el.getAttribute('data-href') ||
               (a && (a.getAttribute('data-url')||a.getAttribute('data-href')));
    return cand || null;
  }
  function decorate(root){
    if(!root) return;
    var cards = root.querySelectorAll('#rpMobileGrid > * , .right-panel .ad-card, .ad-panel .ad-card');
    cards.forEach(function(card){
      // add photoview class
      if(!card.classList.contains('photoview')) card.classList.add('photoview');
      // click-through bindings
      if(card.__pvBound) return;
      card.__pvBound = true;
      var url = getUrlFrom(card);
      // 1) Make whole card clickable, but do not break existing anchors
      function go(){
        var u = getUrlFrom(card);
        if (!u) return;
        // Prefer same-tab navigation for "app-like fullscreen" on mobile
        window.location.assign(u);
      }
      // Activate on click or keyboard
      card.setAttribute('role','link');
      card.setAttribute('tabindex','0');
      card.addEventListener('click', function(e){
        // Avoid double navigating if user clicked a real <a>
        var a = e.target.closest('a[href]');
        if (a) return; // native anchor wins
        go();
      }, {passive:true});
      card.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
    });
  }
  function init(){
    decorate(document);
    // If the mobile 10th-section grid populates later, observe it
    var grid = document.querySelector('#rpMobileGrid');
    if (grid){
      var mo = new MutationObserver(function(){ decorate(grid); });
      mo.observe(grid, {childList:true});
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, {once:true});
  } else {
    init();
  }
  // expose for manual re-run if needed
  window.__PV_DECORATE__ = function(){ decorate(document); };
})();
</script>

<script id="sn-desktop-antisquish-fallback-v2">
(function(){
  if (!window.matchMedia) return;
  function isDesktop(){ return matchMedia('(min-width: 1024px)').matches; }
  function fixDistortion(root){
    if(!isDesktop()) return;
    var media = (root||document).querySelectorAll('.thumb-card img, .thumb-card video, .card img, .card video');
    media.forEach(function(m){
      var cw = m.clientWidth || 0, ch = m.clientHeight || 0;
      var nw = m.naturalWidth || m.videoWidth || 0, nh = m.naturalHeight || m.videoHeight || 0;
      if (cw <= 0 || nw <= 0 || nh <= 0) return;
      var r_dom = ch>0 ? (cw/ch) : 0, r_nat = nw/nh;
      if (r_dom>0 && Math.abs(r_dom - r_nat) / r_nat > 0.2){
        m.style.height = Math.round(cw / r_nat) + 'px';
        m.style.objectFit = 'cover';
      }
    });
  }
  function schedule(){ fixDistortion(); [120, 360, 800].forEach(function(t){ setTimeout(fixDistortion, t); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', schedule, {once:true}); else schedule();
  window.addEventListener('load', fixDistortion, {once:true});
  window.addEventListener('resize', function(){ if(isDesktop()) fixDistortion(); }, {passive:true});
  window.addEventListener('orientationchange', function(){ if(isDesktop()) fixDistortion(); }, {passive:true});
})();
</script>
<script id="igtc-checkout-trigger-v1">
(function(){
  if (window.__IGTC_CHECKOUT_READY__) return;
  window.IGTC = window.IGTC || {};
  function safeJSON(s){ try{ return JSON.parse(s); }catch(_){ return null; } }
  IGTC.checkout = function(opts){
    try{
      var payload = Object.assign({ method: 'card', amount: 0, currency: 'KRW', meta: {} }, opts||{});
      try{ window.dispatchEvent(new CustomEvent('IGTC_CHECKOUT', { detail: payload })); }catch(_){}
      try{ window.postMessage({ type: 'CHECKOUT', payload: payload }, '*'); }catch(_){}
      try{
        fetch('/.netlify/functions/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
          .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
          .then(function(res){
            if(res && res.redirectUrl){ window.location.assign(res.redirectUrl); }
            else if(res && res.qr && res.qr.html){
              var wrap = document.getElementById('igtc-qr-modal'); 
              if(!wrap){
                wrap = document.createElement('div');
                wrap.id = 'igtc-qr-modal';
                wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px';
                wrap.innerHTML = '<div style="background:#fff;border-radius:12px;max-width:420px;width:100%;padding:16px;">'
                  + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b>결제 QR</b>'
                  + '<button id="igtc-qr-close" style="border:0;background:#eee;border-radius:8px;padding:6px 10px;cursor:pointer">닫기</button></div>'
                  + '<div id="igtc-qr-area"></div></div>';
                document.body.appendChild(wrap);
                var btn = document.getElementById('igtc-qr-close');
                if(btn) btn.addEventListener('click', function(){ wrap.remove(); }, { passive:true });
              }
              var area = document.getElementById('igtc-qr-area'); if(area){ area.innerHTML = res.qr.html; }
            }
          })
          .catch(function(){ /* silent fallback */ });
      }catch(_){}
    }catch(_){}
  };
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-checkout]'); if(!el) return;
    var metaAttr = el.getAttribute('data-meta');
    var meta = metaAttr ? (safeJSON(metaAttr) || { note: metaAttr }) : {};
    var amount = parseFloat(el.getAttribute('data-amount')||'0') || 0;
    var currency = el.getAttribute('data-currency') || 'KRW';
    var method = el.getAttribute('data-method') || 'card';
    IGTC.checkout({ method: method, amount: amount, currency: currency, meta: meta });
    e.preventDefault();
  }, { passive:true });
  window.__IGTC_CHECKOUT_READY__ = true;
})();
</script>

<script id="igdc-frame-resize-bridge-v2">
(function(){
  if (window.__IGDC_FRAME_BRIDGE__) return;
  window.__IGDC_FRAME_BRIDGE__ = true;

  function getRealHeight(){
    const body = document.body;
    const html = document.documentElement;

    let h = Math.max(
      body.scrollHeight,
      body.offsetHeight,
      html.clientHeight,
      html.scrollHeight,
      html.offsetHeight
    );

    /* 제거 대상: 숨김/더미 영역 */
    document.querySelectorAll('[data-deferred], .loading, .skeleton, .dummy')
      .forEach(el=>{
        if(el.offsetParent === null){
          h -= el.scrollHeight || 0;
        }
      });

    return Math.max(h, 300);
  }

  function post(){
    try{
      if (window.parent === window) return;

      window.parent.postMessage({
        type: 'IGDC_FRAME_RESIZE',
        page: location.pathname,
        height: getRealHeight()
      }, '*');
    }catch(e){}
  }

  function schedule(){
    post();
    requestAnimationFrame(post);
    setTimeout(post, 200);
    setTimeout(post, 600);
    setTimeout(post, 1200);
  }

  /* DOM 변화 감지 */
  const mo = new MutationObserver(schedule);

  function init(){
    schedule();

    mo.observe(document.body, {
      childList: true,
      subtree: true,
      attributes: true
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init, {once:true});
  }else{
    init();
  }

  window.addEventListener('load', schedule);
  window.addEventListener('resize', schedule);
  window.addEventListener('orientationchange', schedule);

})();
</script>
<script id="igdc-unified-commerce-script">
/*
 IGDC Unified Commerce Script
 --------------------------------------------------
 적용 대상:
  - Distribution (이미 적용 가능)
  - 나머지 4개 사이트 (Donation 제외, Media 제외)
 목적:
  - 썸네일 클릭 자동 감지
  - 상세 상품 자동 오픈 훅
  - 구매하기 / 결제 / 장바구니 기존 버튼 그대로 사용
  - 상세 하단에 리뷰 시스템 자동 장착 (쿠팡 방식)
 --------------------------------------------------
 전제:
  - 썸네일 카드 또는 상세 컨테이너에 data-product-id 존재
  - IGTC.checkout(...) 기존 결제 로직 존재
  - window.__IGDC_ROLE 존재
 --------------------------------------------------
 삽입 위치:
  - 각 페이지 </body> 바로 위
*/

(function (window, document) {
  'use strict';

  const IGDCCommerce = {
    config: {
      reviewApi: '/.netlify/functions/reviews',
      reviewRootId: 'igdc-review-root',
      minReviewChars: 10,
      maxReviewChars: 2000
    },

    state: {
      role: 'guest',
      activeProductId: null
    },

    init() {
      this.state.role = window.__IGDC_ROLE || 'guest';
      this.bindThumbnailAutoHook();
    },

    /* 1️⃣ 썸네일 카드 클릭 자동 감지 */
    bindThumbnailAutoHook() {
      document.addEventListener('click', (e) => {
        const card = e.target.closest('[data-product-id]');
        if (!card) return;

        const productId = card.dataset.productId;
        if (!productId) return;

        // 기존 상세 상품 오픈 로직은 이미 각 페이지에 있음
        // 여기서는 리뷰만 자동 부착
        setTimeout(() => {
          this.mountReview(productId);
        }, 50);
      });
    },

    /* 2️⃣ 리뷰 시스템 장착 */
    mountReview(productId) {
      if (this.state.activeProductId === productId) return;
      this.state.activeProductId = productId;

      let root = document.getElementById(this.config.reviewRootId);
      if (!root) {
        root = document.createElement('div');
        root.id = this.config.reviewRootId;

        const detailContainer =
          document.querySelector('.product-detail') ||
          document.querySelector('.product-modal') ||
          document.querySelector('.detail-view') ||
          document.body;

        detailContainer.appendChild(root);
      }

      root.innerHTML = this.renderReviewShell();
      this.bindReviewForm(root, productId);
      this.loadReviews(productId);
    },

    /* 3️⃣ 리뷰 UI */
    renderReviewShell() {
      const canWrite = this.state.role !== 'guest';
      return `
        <section class="igdc-review">
          <h3 class="igdc-review-title">상품 리뷰</h3>
          <div id="igdc-review-list" class="igdc-review-list">로딩 중...</div>
          ${canWrite ? this.renderReviewForm() : this.renderLoginHint()}
        </section>
      `;
    },

    renderReviewForm() {
      return `
        <form id="igdc-review-form" class="igdc-review-form">
          <textarea
            placeholder="상품 사용 경험을 공유해 주세요"
            minlength="${this.config.minReviewChars}"
            maxlength="${this.config.maxReviewChars}"
            required></textarea>
          <div class="igdc-review-actions">
            <button type="submit">리뷰 등록</button>
          </div>
        </form>
      `;
    },

    renderLoginHint() {
      return `<div class="igdc-review-login-hint">
        리뷰 작성은 로그인 후 가능합니다.
      </div>`;
    },

    /* 4️⃣ 리뷰 이벤트 */
    bindReviewForm(root, productId) {
      const form = root.querySelector('#igdc-review-form');
      if (!form) return;

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const textarea = form.querySelector('textarea');
        const content = textarea.value.trim();

        if (content.length < this.config.minReviewChars) {
          alert(`리뷰는 최소 ${this.config.minReviewChars}자 이상 작성해 주세요.`);
          return;
        }

        this.submitReview(productId, content)
          .then(() => {
            textarea.value = '';
            this.loadReviews(productId);
          })
          .catch(() => alert('리뷰 등록 실패'));
      });
    },

    /* 5️⃣ 리뷰 로딩 */
    async loadReviews(productId) {
      const list = document.getElementById('igdc-review-list');
      if (!list) return;

      list.textContent = '로딩 중...';

      try {
        const res = await fetch(
          `${this.config.reviewApi}?productId=${encodeURIComponent(productId)}`
        );
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = '<div class="igdc-review-empty">아직 리뷰가 없습니다.</div>';
          return;
        }

        list.innerHTML = data.map(this.renderReviewItem).join('');
      } catch {
        list.textContent = '리뷰를 불러오지 못했습니다.';
      }
    },

    async submitReview(productId, content) {
      const res = await fetch(this.config.reviewApi, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, content })
      });
      if (!res.ok) throw new Error('submit failed');
    },

    renderReviewItem(item) {
      const esc = (v) => String(v || '').replace(/[<>]/g, '');
      return `
        <div class="igdc-review-item">
          <div class="igdc-review-meta">
            <span>${esc(item.user || '익명')}</span>
            <span>${esc(item.date || '')}</span>
          </div>
          <div class="igdc-review-content">${esc(item.content)}</div>
        </div>
      `;
    }
  };

  /* 6️⃣ 기본 스타일 */
  const style = document.createElement('style');
  style.textContent = `
    .igdc-review { margin-top:24px; border-top:1px solid #eee; padding-top:16px; }
    .igdc-review-title { margin:0 0 12px; font-size:1.05rem; }
    .igdc-review-list { display:flex; flex-direction:column; gap:10px; }
    .igdc-review-item { border:1px solid #eee; border-radius:10px; padding:10px; background:#fafafa; }
    .igdc-review-meta { font-size:.8rem; color:#666; display:flex; gap:8px; }
    .igdc-review-content { margin-top:6px; line-height:1.5; }
    .igdc-review-form textarea { width:100%; min-height:90px; padding:10px; border-radius:10px; border:1px solid #ddd; }
    .igdc-review-actions { margin-top:8px; text-align:right; }
    .igdc-review-actions button { padding:8px 14px; border-radius:10px; border:none; background:#2563eb; color:#fff; }
    .igdc-review-empty, .igdc-review-login-hint { color:#666; }
  `;
  document.head.appendChild(style);

  IGDCCommerce.init();
  window.IGDCCommerce = IGDCCommerce;

})(window, document);
</script>

<script id="rightpanel-dummy-bootstrap">
(function(){

  const PANEL_ID = 'rightAutoPanel';
  const DESKTOP_COUNT = 100;
  const MOBILE_COUNT = 1;

  function isMobile(){
    return window.innerWidth <= 768;
  }

  function getCount(){
    return isMobile() ? MOBILE_COUNT : DESKTOP_COUNT;
  }

  function getPanel(){
    return document.getElementById(PANEL_ID);
  }

  function resetHeight(panel){
    panel.style.minHeight = '0';
    panel.style.height = 'auto';
    panel.style.maxHeight = 'none';
  }

  function applyMobileHeight(panel){
    panel.style.maxHeight = 'none';
  }

  function build(){

    const panel = getPanel();
    if(!panel) return;

    resetHeight(panel);
    panel.innerHTML = '';

    const count = getCount();

    for(let i=0;i<count;i++){
      const card = document.createElement('div');
      card.className = 'ad-box';
      card.dataset.dummy = '1';
      card.innerHTML = '<div style="height:144px;display:flex;align-items:center;justify-content:center;">Loading...</div>';
      panel.appendChild(card);
    }

    if(isMobile()){
      applyMobileHeight(panel);
    }
  }

  function init(){

    const wait = setInterval(()=>{

      const panel = getPanel();
      if(panel){
        clearInterval(wait);
        build();
      }

    },50);

  }

  window.addEventListener('resize',()=>{
    build();
  });

  window.__IGDC_RIGHTPANEL_RENDER = function(items){

    const panel = getPanel();
    if(!panel) return;

    panel.innerHTML = '';
    resetHeight(panel);

    items.forEach(item=>{
      const card = document.createElement('div');
      card.className = 'ad-box';
      card.innerHTML = `<a href="${item.link||'#'}">Item</a>`;
      panel.appendChild(card);
    });

  };

  init();

})();
</script>
